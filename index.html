<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SK Education World - Math Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,system-ui,sans-serif}
        :root{--primary:#2ECC71;--primary-dark:#1a8a4a;--secondary:#3498DB;--warning:#E67E22;--danger:#e74c3c;--dark:#0a0a1a;--light:rgba(46,204,113,0.1);--white:#fff;--card-bg:#16213e;--card2:#0f3460}
        html{-webkit-tap-highlight-color:transparent}
        body{background:#0a0a1a;color:#fff;max-width:480px;margin:0 auto;padding:16px;min-height:100vh;-webkit-font-smoothing:antialiased}
        
        .header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 20px}
        .logo-container{display:flex;align-items:center;gap:12px}
        .logo{width:50px;height:50px;background:var(--primary);border-radius:16px;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:22px}
        .welcome-text{font-size:15px;color:rgba(255,255,255,0.6)}
        .welcome-text span{color:var(--primary);font-size:18px;font-weight:700;display:block}
        .menu-icon{cursor:pointer;padding:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:14px;-webkit-tap-highlight-color:transparent}
        .menu-icon span{display:block;width:22px;height:3px;background:#fff;margin:4px 0;border-radius:3px}
        
        .menu-dropdown{position:fixed;top:80px;right:16px;background:#16213e;border:1px solid rgba(46,204,113,0.2);border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,0.5);padding:8px;display:none;z-index:1000;min-width:220px;will-change:transform}
        .menu-dropdown.active{display:block;animation:fadeIn .15s ease-out}
        .menu-dropdown a{display:flex;align-items:center;gap:12px;padding:16px;text-decoration:none;color:#fff;border-radius:18px;cursor:pointer}
        .menu-dropdown a:active{background:rgba(46,204,113,0.15)}
        
        .section-title{font-size:24px;margin:20px 0 15px;font-weight:700;padding-left:16px;border-left:6px solid var(--primary)}
        .categories-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
        .category-card{background:#16213e;border-radius:24px;padding:24px 16px;text-align:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);-webkit-tap-highlight-color:transparent;transform:translateZ(0)}
        .category-card:active{transform:scale(0.97)}
        .category-icon{font-size:42px;margin-bottom:10px;display:block}
        .category-name{font-weight:600;color:#fff}
        .category-card.calculator-card{background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:white;grid-column:span 2}
        .category-card.calculator-card .category-name{color:white}
        .category-card.practice-card{background:linear-gradient(135deg,#667eea,#764ba2);color:white;grid-column:span 2}
        .category-card.practice-card .category-name{color:white}
        
        .level-selection{background:#16213e;border-radius:32px;padding:30px 24px;margin:20px 0;box-shadow:0 4px 30px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07)}
        .level-title{text-align:center;margin-bottom:25px;font-size:22px;font-weight:700}
        .level-buttons{display:flex;flex-direction:column;gap:12px}
        .level-btn{padding:20px;border:none;border-radius:20px;font-size:18px;font-weight:700;cursor:pointer;color:white;display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:transparent}
        .level-btn.easy{background:linear-gradient(135deg,#4CAF50,#2E7D32)}
        .level-btn.medium{background:linear-gradient(135deg,#FF9800,#F57C00)}
        .level-btn.hard{background:linear-gradient(135deg,#f44336,#C62828)}
        .level-range{font-size:14px;background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:40px}
        .back-btn{margin-top:20px;padding:16px;border:none;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:18px;width:100%;font-size:16px;font-weight:600;cursor:pointer;color:#fff;-webkit-tap-highlight-color:transparent}
        
        .calculator-section{background:#1a1a2e;border-radius:32px;padding:20px;margin:10px 0}
        .calculator-tabs{display:flex;gap:8px;margin-bottom:16px;background:rgba(255,255,255,0.05);padding:5px;border-radius:18px}
        .calc-tab{flex:1;padding:12px;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,0.5);font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}
        .calc-tab.active{background:var(--primary);color:white;box-shadow:0 4px 15px rgba(46,204,113,0.3)}
        .calculator{background:#0d1117;border-radius:24px;padding:16px;border:1px solid rgba(255,255,255,0.07)}
        .calc-display{background:#0a0a1a;border-radius:16px;padding:16px 20px;margin-bottom:14px;text-align:right;font-size:34px;font-weight:800;min-height:72px;word-wrap:break-word;border:1px solid rgba(255,255,255,0.08);color:#2ECC71;font-family:'Nunito',monospace;letter-spacing:1px}
        
        .normal-calc .calc-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
        .algebra-calc .calc-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
        
        .calc-btn{padding:18px 8px;border:none;border-radius:16px;font-size:18px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.07);color:white;border:1px solid rgba(255,255,255,0.05);font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .calc-btn:active{transform:scale(0.93);background:rgba(255,255,255,0.15)}
        .calc-btn.operator{background:rgba(230,126,34,0.35);color:#E67E22;border-color:rgba(230,126,34,0.3)}
        .calc-btn.equals{background:var(--primary);color:white;border-color:transparent;box-shadow:0 4px 15px rgba(46,204,113,0.25)}
        .calc-btn.clear{background:rgba(231,76,60,0.35);color:#e74c3c;border-color:rgba(231,76,60,0.3)}
        .calc-btn.function{background:rgba(52,152,219,0.35);color:#3498DB;border-color:rgba(52,152,219,0.3)}
        .calc-btn.span2{grid-column:span 2}
        .calc-btn.span3{grid-column:span 3}
        
        .game-area{animation:slideUp .2s ease-out}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
        .game-header{display:flex;justify-content:space-between;margin-bottom:20px;align-items:center}
        .timer{font-size:32px;font-weight:800;color:#ff6b6b;background:rgba(231,76,60,0.15);padding:12px 24px;border-radius:60px;border:1px solid rgba(231,76,60,0.3)}
        .timer.warning{animation:pulse .5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .progress{background:rgba(46,204,113,0.15);padding:12px 24px;border-radius:60px;font-weight:700;color:var(--primary);font-size:16px;border:1px solid rgba(46,204,113,0.3)}
        .question-card{background:linear-gradient(135deg,#667eea,#764ba2);padding:50px 20px;border-radius:40px;margin-bottom:20px;text-align:center}
        .question-text{color:white;font-size:48px;font-weight:800}
        .options-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
        .option-btn{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);border-radius:22px;padding:22px 10px;font-size:24px;font-weight:700;cursor:pointer;color:#fff;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .option-btn:active{transform:scale(0.96)}
        .option-btn.correct{background:#4CAF50;color:white;border-color:#4CAF50;animation:correctPop .3s ease-out}
        .option-btn.wrong{background:#f44336;color:white;border-color:#f44336;animation:wrongShake .3s ease-out}
        .option-btn:disabled{opacity:0.7;cursor:not-allowed}
        @keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
        @keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
        .action-buttons{display:flex;gap:14px}
        .skip-btn,.submit-btn{flex:1;padding:18px;border:none;border-radius:22px;font-size:17px;font-weight:700;cursor:pointer;color:white;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .skip-btn{background:linear-gradient(135deg,#FF9800,#F57C00)}
        .submit-btn{background:linear-gradient(135deg,#2196F3,#1976D2)}
        
        .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px;animation:fadeIn .2s ease-out;backdrop-filter:blur(4px)}
        .modal-content{background:#16213e;border:1px solid rgba(255,255,255,0.1);padding:32px 24px;border-radius:40px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto;color:#fff;animation:slideUp .25s ease-out}
        .stat{font-size:18px;margin:12px 0;padding:14px;border-radius:18px;font-weight:600}
        .stat.correct{background:#E8F5E9;color:#2E7D32}
        .stat.wrong{background:#FFEBEE;color:#C62828}
        .stat.skipped{background:#FFF3E0;color:#EF6C00}
        .stat.score{background:#E3F2FD;color:#1565C0}
        .play-again-btn{background:linear-gradient(135deg,#4CAF50,#2E7D32);color:white;border:none;padding:18px 32px;border-radius:50px;font-size:18px;font-weight:700;cursor:pointer;width:100%;margin-top:15px;-webkit-tap-highlight-color:transparent}
        
        .scoreboard-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:15px}
        .stat-card{background:rgba(46,204,113,0.1);padding:16px;border-radius:16px;text-align:center}
        .stat-card .number{font-size:28px;font-weight:800;color:var(--primary)}
        .history-item{background:rgba(255,255,255,0.05);padding:14px;border-radius:16px;margin-bottom:10px}
        .history-header{display:flex;justify-content:space-between;margin-bottom:8px}
        .history-category{font-weight:700;color:var(--primary)}
        .history-difficulty{font-size:12px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.1)}
        .history-difficulty.easy{background:rgba(76,175,80,0.2);color:#4CAF50}
        .history-difficulty.medium{background:rgba(255,152,0,0.2);color:#FF9800}
        .history-difficulty.hard{background:rgba(244,67,54,0.2);color:#f44336}
        .history-stats{display:flex;justify-content:space-around;margin-bottom:8px}
        .history-stat{font-size:14px;font-weight:600}
        .history-date{font-size:11px;color:rgba(255,255,255,0.5);text-align:right}
        
        .hidden{display:none!important}
        
        /* Hardware acceleration for animations */
        .category-card,.option-btn,.calc-btn,.level-btn{transform:translateZ(0);backface-visibility:hidden}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-container">
            <div class="logo">SK</div>
            <div class="welcome-text">
                Welcome to
                <span id="headerName">SK_education_world 🌍</span>
            </div>
        </div>
        <div class="menu-icon" id="menuIcon">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div class="menu-dropdown" id="menuDropdown">
        <a onclick="showScoreboard(); toggleMenu();">📊 Your Scoreboard</a>
        <a onclick="window.location.href='dashboard.html'">🏠 My Dashboard</a>
        <a onclick="doLogout()">🚪 Logout</a>
    </div>

    <div id="mainContent"></div>
    <div id="modalContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Performance optimizations
        const $=id=>document.getElementById(id);
        const $$=sel=>document.querySelectorAll(sel);
        
        const firebaseConfig={
            apiKey:"AIzaSyADzxE7HmL1Z9A7VM_VWo9I5Z2Y6_aZERk",
            authDomain:"my-game-17edb.firebaseapp.com",
            databaseURL:"https://my-game-17edb-default-rtdb.firebaseio.com",
            projectId:"my-game-17edb",
            storageBucket:"my-game-17edb.firebasestorage.app",
            appId:"1:980626912031:android:ae22c6a423ab33e76ef62a"
        };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth=firebase.auth();
        const db=firebase.database();
        let currentUser=null;

        // Cache DOM elements
        let mainContent, modalContainer, menuDropdown, headerName;
        
        auth.onAuthStateChanged(user=>{
            if(!user){ window.location.href='login.html'; return; }
            currentUser=user;
            db.ref('users/'+user.uid).get().then(snap=>{
                if(snap.exists()){ $('headerName').textContent=(snap.val().name||'Player')+' 🌍'; }
            });
            initApp();
        });

        function doLogout(){ if(confirm('Logout?')){ auth.signOut().then(()=>window.location.href='login.html'); } }
        function toggleMenu() { menuDropdown.classList.toggle('active'); }

        // Pre-generate practice questions once
        const MATH_PRACTICE_QS = [];
        for(let i=0;i<100;i++){
            if(i<25) MATH_PRACTICE_QS.push({q:`√${(i+1)*(i+1)} = ?`, a:i+1, opts:[i+1, i+2, i+3, i+4]});
            else if(i<50) { const n=i-24; MATH_PRACTICE_QS.push({q:`∛${n*n*n} = ?`, a:n, opts:[n, n+1, n+2, n+3]}); }
            else if(i<75) { const n=i-49; MATH_PRACTICE_QS.push({q:`${n}² = ?`, a:n*n, opts:[n*n, n*n+1, n*n+2, n*n+3]}); }
            else { const n=i-74; MATH_PRACTICE_QS.push({q:`${n}³ = ?`, a:n*n*n, opts:[n*n*n, n*n*n+1, n*n*n+2, n*n*n+3]}); }
        }

        const GameState = {
            currentCategory:'', currentDifficulty:'',
            score:0, correct:0, wrong:0, skipped:0,
            questionCount:0, timer:null, timeLeft:15,
            currentQuestion:null,
            categories:[
                {id:1, name:'Square Root', icon:'√', color:'#4CAF50'},
                {id:2, name:'Cube Root', icon:'∛', color:'#2196F3'},
                {id:3, name:'Square Numbers', icon:'x²', color:'#FF9800'},
                {id:4, name:'Cube Numbers', icon:'x³', color:'#9C27B0'},
                {id:5, name:'Calculator', icon:'🧮', isCalculator:true},
                {id:6, name:'Math Practice', icon:'📚', isPractice:true}
            ],
            calculator:{normalExpr:'', algebraExpr:''},
            practiceQs:[], practiceIdx:0,
            practiceCorrect:0, practiceWrong:0, practiceSkipped:0,
            practiceScore:0, practiceAnswered:false
        };

        function initApp() {
            // Cache DOM references
            mainContent = $('mainContent');
            modalContainer = $('modalContainer');
            menuDropdown = $('menuDropdown');
            headerName = $('headerName');
            
            renderCategories();
            
            // Use event delegation for better performance
            $('menuIcon').onclick = e => { e.stopPropagation(); toggleMenu(); };
            document.onclick = () => menuDropdown.classList.remove('active');
            menuDropdown.onclick = e => e.stopPropagation();
        }

        function renderCategories() {
            let html = `<h2 class="section-title">Choose Category</h2><div class="categories-grid">`;
            GameState.categories.forEach(cat => {
                if (cat.isCalculator) {
                    html += `<div class="category-card calculator-card" onclick="openCalculator()">
                        <span class="category-icon">${cat.icon}</span>
                        <div class="category-name">${cat.name}</div></div>`;
                } else if (cat.isPractice) {
                    html += `<div class="category-card practice-card" onclick="openMathPractice()">
                        <span class="category-icon">${cat.icon}</span>
                        <div class="category-name">${cat.name} (100 Qs)</div></div>`;
                } else {
                    html += `<div class="category-card" onclick="selectCategory('${cat.name}')">
                        <span class="category-icon" style="color:${cat.color}">${cat.icon}</span>
                        <div class="category-name">${cat.name}</div></div>`;
                }
            });
            html += `</div>`;
            document.getElementById('mainContent').innerHTML = html;
        }

        function selectCategory(category) {
            GameState.currentCategory = category;
            document.getElementById('mainContent').innerHTML = `
                <div class="level-selection">
                    <h3 class="level-title">${category} - Select Level</h3>
                    <div class="level-buttons">
                        <button class="level-btn easy" onclick="startGame('easy')">Easy <span class="level-range">1-30</span></button>
                        <button class="level-btn medium" onclick="startGame('medium')">Medium <span class="level-range">31-50</span></button>
                        <button class="level-btn hard" onclick="startGame('hard')">Hard <span class="level-range">51-100</span></button>
                    </div>
                    <button class="back-btn" onclick="backToMain()">��� Back</button>
                </div>`;
        }

        function backToMain() {
            if (GameState.timer) clearInterval(GameState.timer);
            renderCategories();
        }

        function startGame(difficulty) {
            GameState.currentDifficulty = difficulty;
            GameState.score=0; GameState.correct=0; GameState.wrong=0; GameState.skipped=0; GameState.questionCount=0;
            renderGame();
        }

        function renderGame() {
            document.getElementById('mainContent').innerHTML = `
                <div class="game-area">
                    <div class="game-header">
                        <div class="timer" id="timer">20s</div>
                        <div class="progress">Q<span id="currentQ">1</span></div>
                    </div>
                    <div class="question-card"><div class="question-text" id="questionText">Loading...</div></div>
                    <div class="options-grid" id="optionsGrid"></div>
                    <div class="action-buttons">
                        <button class="skip-btn" onclick="skipQuestion()">⏭️ Skip</button>
                        <button class="submit-btn" onclick="endQuiz()">📥 Submit</button>
                    </div>
                </div>`;
            generateNewQuestion();
        }

        function generateNewQuestion() {
            GameState.questionCount++;
            document.getElementById('currentQ').textContent = GameState.questionCount;

            let range;
            if (GameState.currentDifficulty === 'easy') range = {min:1, max:30};
            else if (GameState.currentDifficulty === 'medium') range = {min:31, max:50};
            else range = {min:51, max:100};

            let num = Math.floor(Math.random()*(range.max-range.min+1))+range.min;
            let answer, questionText;

            switch(GameState.currentCategory) {
                case 'Square Root':
                    answer = num; questionText = `√${num*num} = ?`; break;
                case 'Cube Root':
                    let cn = Math.floor(Math.random()*10)+1; answer=cn; questionText=`∛${cn*cn*cn} = ?`; break;
                case 'Square Numbers':
                    answer=num*num; questionText=`${num}² = ?`; break;
                case 'Cube Numbers':
                    let sn = Math.floor(Math.random()*10)+1; answer=sn*sn*sn; questionText=`${sn}³ = ?`; break;
            }

            let options=[answer];
            while(options.length<4){
                let off=Math.floor(Math.random()*10)-5; if(off===0) off=1;
                let opt=answer+off; if(opt>0&&!options.includes(opt)) options.push(opt);
            }
            GameState.currentQuestion={text:questionText, answer, options:shuffle(options)};
            displayQuestion();
        }

        function displayQuestion() {
            const q = GameState.currentQuestion;
            document.getElementById('questionText').textContent = q.text;
            let html='';
            q.options.forEach(o=>{ html+=`<button class="option-btn" onclick="checkAnswer(${o},this)">${o}</button>`; });
            document.getElementById('optionsGrid').innerHTML = html;
            startTimer();
        }

        function startTimer() {
            if(GameState.timer) clearInterval(GameState.timer);
            GameState.timeLeft=20;
            const timerEl=document.getElementById('timer');
            timerEl.textContent='20s'; timerEl.classList.remove('warning');
            GameState.timer=setInterval(()=>{
                GameState.timeLeft--;
                timerEl.textContent=GameState.timeLeft+'s';
                if(GameState.timeLeft<=5) timerEl.classList.add('warning');
                if(GameState.timeLeft<=0){ clearInterval(GameState.timer); timeOut(); }
            },1000);
        }

        function checkAnswer(selected, btn) {
            clearInterval(GameState.timer);
            const q=GameState.currentQuestion;
            document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
            if(selected==q.answer){ btn.classList.add('correct'); GameState.correct++; GameState.score+=10; }
            else {
                btn.classList.add('wrong'); GameState.wrong++;
                document.querySelectorAll('.option-btn').forEach(b=>{ if(parseFloat(b.textContent)==q.answer) b.classList.add('correct'); });
            }
            setTimeout(()=>generateNewQuestion(), 800);
        }

        function timeOut() {
            GameState.wrong++;
            const q=GameState.currentQuestion;
            document.querySelectorAll('.option-btn').forEach(b=>{ b.disabled=true; if(parseFloat(b.textContent)==q.answer) b.classList.add('correct'); });
            setTimeout(()=>generateNewQuestion(), 800);
        }

        function skipQuestion() {
            clearInterval(GameState.timer); GameState.skipped++;
            const q=GameState.currentQuestion;
            document.querySelectorAll('.option-btn').forEach(b=>{ b.disabled=true; if(parseFloat(b.textContent)==q.answer) b.classList.add('correct'); });
            setTimeout(()=>generateNewQuestion(), 600);
        }

        function endQuiz() {
            clearInterval(GameState.timer);
            saveGameToStorage();
            showResultModal();
        }

        function showResultModal() {
            document.getElementById('modalContainer').innerHTML = `
                <div class="modal"><div class="modal-content">
                    <h2 style="text-align:center;margin-bottom:15px;">🎉 Quiz Complete!</h2>
                    <div class="stat correct">✅ Correct: <b>${GameState.correct}</b></div>
                    <div class="stat wrong">❌ Wrong: <b>${GameState.wrong}</b></div>
                    <div class="stat skipped">⏭️ Skipped: <b>${GameState.skipped}</b></div>
                    <div class="stat score">⭐ Score: <b>${GameState.score}</b></div>
                    <button class="play-again-btn" onclick="playAgain()">Play Again</button>
                </div></div>`;
        }

        function playAgain() { closeModal(); backToMain(); }

        function openMathPractice() {
            GameState.practiceQs = shuffle([...MATH_PRACTICE_QS]);
            GameState.practiceIdx = 0;
            GameState.practiceCorrect = 0; GameState.practiceWrong = 0;
            GameState.practiceSkipped = 0; GameState.practiceScore = 0;
            renderPractice();
        }

        function renderPractice() {
            const idx = GameState.practiceIdx;
            const total = GameState.practiceQs.length;
            if (idx >= total) { endPractice(); return; }

            const q = GameState.practiceQs[idx];
            const opts = shuffle([...q.opts]);
            const pct = Math.round((idx/total)*100);

            document.getElementById('mainContent').innerHTML = `
                <div class="calculator-section">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <span style="font-weight:700;color:#667eea;">Q${idx+1}/${total}</span>
                        <span style="font-weight:700;color:#4CAF50;">Score: ${GameState.practiceScore}</span>
                    </div>
                    <div style="height:8px; background:rgba(255,255,255,0.1); border-radius:4px; margin-bottom:20px; overflow:hidden;">
                        <div style="height:100%; background:linear-gradient(90deg,#667eea,#764ba2); border-radius:4px; width:${pct}%;"></div>
                    </div>
                    <div class="question-card" style="padding:30px 20px;">
                        <div style="color:rgba(255,255,255,0.7); font-size:14px; margin-bottom:8px;">Question ${idx+1} of ${total}</div>
                        <div class="question-text" style="font-size:36px;">${q.q}</div>
                    </div>
                    <div class="options-grid" id="pOpts">
                        ${opts.map(o=>`<button class="option-btn" onclick="checkPracticeAnswer(${o},this,${q.a})">${o}</button>`).join('')}
                    </div>
                    <div class="action-buttons">
                        <button class="skip-btn" onclick="skipPractice()">⏭️ Skip</button>
                        <button class="submit-btn" onclick="endPractice()">📥 Submit All</button>
                    </div>
                    <button class="back-btn" style="margin-top:12px;" onclick="backToMain()">← Back to Menu</button>
                </div>`;
            GameState.practiceAnswered = false;
        }

        function checkPracticeAnswer(selected, btn, answer) {
            if (GameState.practiceAnswered) return;
            GameState.practiceAnswered = true;
            document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
            if (selected == answer) {
                btn.classList.add('correct'); GameState.practiceCorrect++; GameState.practiceScore += 10;
            } else {
                btn.classList.add('wrong'); GameState.practiceWrong++;
                document.querySelectorAll('.option-btn').forEach(b=>{ if(parseFloat(b.textContent)==answer) b.classList.add('correct'); });
            }
            setTimeout(()=>{ GameState.practiceIdx++; renderPractice(); }, 700);
        }

        function skipPractice() {
            if (GameState.practiceAnswered) return;
            GameState.practiceSkipped++;
            const q = GameState.practiceQs[GameState.practiceIdx];
            document.querySelectorAll('.option-btn').forEach(b=>{ b.disabled=true; if(parseFloat(b.textContent)==q.a) b.classList.add('correct'); });
            setTimeout(()=>{ GameState.practiceIdx++; renderPractice(); }, 500);
        }

        function endPractice() {
            savePracticeToStorage();
            document.getElementById('modalContainer').innerHTML = `
                <div class="modal"><div class="modal-content">
                    <h2 style="text-align:center;margin-bottom:10px;">📚 Practice Complete!</h2>
                    <div class="stat correct">✅ Correct: <b>${GameState.practiceCorrect}</b></div>
                    <div class="stat wrong">❌ Wrong: <b>${GameState.practiceWrong}</b></div>
                    <div class="stat skipped">⏭️ Skipped: <b>${GameState.practiceSkipped}</b></div>
                    <div class="stat score">⭐ Score: <b>${GameState.practiceScore}</b></div>
                    <button class="play-again-btn" onclick="closeModal(); backToMain();">Back to Menu</button>
                </div></div>`;
        }

        function savePracticeToStorage() {
            const gameData = {
                id:Date.now(), category:'Math Practice', difficulty:'all',
                correct:GameState.practiceCorrect, wrong:GameState.practiceWrong,
                skipped:GameState.practiceSkipped, score:GameState.practiceScore,
                total:MATH_PRACTICE_QS.length, date:new Date().toLocaleString()
            };
            if(currentUser){
                const uid=currentUser.uid;
                db.ref('gameHistory/'+uid+'/'+gameData.id).set(gameData);
                db.ref('users/'+uid).transaction(u=>{
                    if(u){ u.score=(u.score||0)+GameState.practiceScore; u.gamesPlayed=(u.gamesPlayed||0)+1; 
                    u.totalCorrect=(u.totalCorrect||0)+GameState.practiceCorrect; 
                    u.totalWrong=(u.totalWrong||0)+GameState.practiceWrong; 
                    u.totalSkipped=(u.totalSkipped||0)+GameState.practiceSkipped; }
                    return u;
                });
                const hist=JSON.parse(localStorage.getItem('quizHistory_'+uid))||[];
                hist.unshift(gameData); if(hist.length>50) hist.pop();
                localStorage.setItem('quizHistory_'+uid,JSON.stringify(hist));
            }
        }

        function saveGameToStorage() {
            const gameData={
                id:Date.now(), category:GameState.currentCategory, difficulty:GameState.currentDifficulty,
                correct:GameState.correct, wrong:GameState.wrong, skipped:GameState.skipped,
                score:GameState.score, total:GameState.questionCount, date:new Date().toLocaleString()
            };
            if(currentUser){
                const uid=currentUser.uid;
                db.ref('gameHistory/'+uid+'/'+gameData.id).set(gameData);
                db.ref('users/'+uid).transaction(u=>{
                    if(u){ u.score=(u.score||0)+GameState.score; u.gamesPlayed=(u.gamesPlayed||0)+1;
                    u.totalCorrect=(u.totalCorrect||0)+GameState.correct;
                    u.totalWrong=(u.totalWrong||0)+GameState.wrong;
                    u.totalSkipped=(u.totalSkipped||0)+GameState.skipped; }
                    return u;
                });
                const hist=JSON.parse(localStorage.getItem('quizHistory_'+uid))||[];
                hist.unshift(gameData); if(hist.length>50) hist.pop();
                localStorage.setItem('quizHistory_'+uid,JSON.stringify(hist));
            }
        }

        function getGameHistory() { 
            if(currentUser) return JSON.parse(localStorage.getItem('quizHistory_'+currentUser.uid))||[];
            return []; 
        }

        function openCalculator() {
            document.getElementById('mainContent').innerHTML = `
                <div class="calculator-section">
                    <div class="calculator-tabs">
                        <button class="calc-tab active" onclick="switchCalculator('normal')">🧮 Normal</button>
                        <button class="calc-tab" onclick="switchCalculator('algebra')">🔢 Algebra</button>
                    </div>
                    <div class="calculator normal-calc" id="normalCalc">
                        <div class="calc-display" id="normalDisplay">0</div>
                        <div class="calc-buttons" id="normalButtons"></div>
                    </div>
                    <div class="calculator algebra-calc hidden" id="algebraCalc">
                        <div class="calc-display" id="algebraDisplay">0</div>
                        <div class="calc-buttons" id="algebraButtons"></div>
                    </div>
                    <button class="back-btn" onclick="backToMain()" style="margin-top:20px;">← Back</button>
                </div>`;
            renderNormalCalculator();
            renderAlgebraCalculator();
            GameState.calculator.normalExpr=''; GameState.calculator.algebraExpr='';
        }

        function switchCalculator(type) {
            document.getElementById('normalCalc').classList.toggle('hidden', type!=='normal');
            document.getElementById('algebraCalc').classList.toggle('hidden', type!=='algebra');
            document.querySelectorAll('.calc-tab').forEach(t=>{
                t.classList.toggle('active', t.textContent.includes(type==='normal'?'Normal':'Algebra'));
            });
        }

        function renderNormalCalculator() {
            const rows=[['C','(',')','÷'],['7','8','9','×'],['4','5','6','-'],['1','2','3','+'],['0','.','⌫','=']];
            let html='';
            rows.forEach(row=>row.forEach(btn=>{
                let cls='calc-btn';
                if(btn==='C') cls+=' clear';
                else if(btn==='=') cls+=' equals';
                else if(['+','-','×','÷'].includes(btn)) cls+=' operator';
                else if(btn==='⌫') cls+=' function';
                html+=`<button class="${cls}" onclick="handleNormalCalc('${btn}')">${btn}</button>`;
            }));
            document.getElementById('normalButtons').innerHTML=html;
        }

        function renderAlgebraCalculator() {
            const rows=[
                ['C','x²','x³'],
                ['√x','∛x','⌫'],
                ['7','8','9'],
                ['4','5','6'],
                ['1','2','3'],
                ['0','.', '+'],
                ['-','×','÷'],
                ['=']
            ];
            let html='';
            rows.forEach(row=>row.forEach(btn=>{
                let cls='calc-btn';
                if(btn==='C') cls+=' clear';
                else if(btn==='=') cls+=' equals span3';
                else if(['+','-','×','÷'].includes(btn)) cls+=' operator';
                else if(['x²','x³','√x','∛x','⌫'].includes(btn)) cls+=' function';
                html+=`<button class="${cls}" onclick="handleAlgebraCalc('${btn}')">${btn}</button>`;
            }));
            document.getElementById('algebraButtons').innerHTML=html;
        }

        function handleNormalCalc(btn) {
            const disp=document.getElementById('normalDisplay');
            if(btn==='C'){ GameState.calculator.normalExpr=''; disp.textContent='0'; }
            else if(btn==='⌫'){ GameState.calculator.normalExpr=GameState.calculator.normalExpr.slice(0,-1); disp.textContent=GameState.calculator.normalExpr||'0'; }
            else if(btn==='='){
                try{
                    let expr=GameState.calculator.normalExpr.replace(/×/g,'*').replace(/÷/g,'/');
                    let r=eval(expr); disp.textContent=r; GameState.calculator.normalExpr=String(r);
                }catch{ disp.textContent='Error'; GameState.calculator.normalExpr=''; }
            } else { GameState.calculator.normalExpr+=btn; disp.textContent=GameState.calculator.normalExpr; }
        }

        function handleAlgebraCalc(btn) {
            const disp=document.getElementById('algebraDisplay');
            if(btn==='C'){ GameState.calculator.algebraExpr=''; disp.textContent='0'; }
            else if(btn==='⌫'){ GameState.calculator.algebraExpr=GameState.calculator.algebraExpr.slice(0,-1); disp.textContent=GameState.calculator.algebraExpr||'0'; }
            else if(btn==='x²'){ let n=parseFloat(GameState.calculator.algebraExpr)||0; let r=n*n; disp.textContent=r; GameState.calculator.algebraExpr=String(r); }
            else if(btn==='x³'){ let n=parseFloat(GameState.calculator.algebraExpr)||0; let r=n*n*n; disp.textContent=r; GameState.calculator.algebraExpr=String(r); }
            else if(btn==='√x'){ let n=parseFloat(GameState.calculator.algebraExpr)||0; if(n<0){disp.textContent='Error';GameState.calculator.algebraExpr='';}else{let r=Math.sqrt(n); disp.textContent=r; GameState.calculator.algebraExpr=String(r);} }
            else if(btn==='∛x'){ let n=parseFloat(GameState.calculator.algebraExpr)||0; let r=Math.cbrt(n); disp.textContent=r; GameState.calculator.algebraExpr=String(r); }
            else if(btn==='='){
                try{
                    let expr=GameState.calculator.algebraExpr.replace(/×/g,'*').replace(/÷/g,'/');
                    let r=eval(expr); disp.textContent=r; GameState.calculator.algebraExpr=String(r);
                }catch{ disp.textContent=GameState.calculator.algebraExpr||'0'; }
            } else { GameState.calculator.algebraExpr+=btn; disp.textContent=GameState.calculator.algebraExpr; }
        }

        function showScoreboard() {
            const history = getGameHistory();
            if(history.length===0){
                document.getElementById('modalContainer').innerHTML=`
                    <div class="modal"><div class="modal-content">
                        <h2>📊 Your Scoreboard</h2>
                        <div style="text-align:center;padding:30px;color:#888;">No games yet! Play some quizzes 🎮</div>
                        <button class="play-again-btn" onclick="closeModal()">Close</button>
                    </div></div>`;
                return;
            }
            let totalScore=0; history.forEach(g=>totalScore+=g.score||0);
            let hHtml='';
            history.slice(0,15).forEach(g=>{
                hHtml+=`<div class="history-item">
                    <div class="history-header">
                        <span class="history-category">${g.category}</span>
                        <span class="history-difficulty ${g.difficulty||'easy'}">${g.difficulty||'—'}</span>
                    </div>
                    <div class="history-stats">
                        <div class="history-stat" style="color:#4CAF50;">✅ ${g.correct}</div>
                        <div class="history-stat" style="color:#f44336;">❌ ${g.wrong}</div>
                        <div class="history-stat" style="color:#FF9800;">⏭️ ${g.skipped}</div>
                        <div class="history-stat" style="color:#2196F3;">⭐ ${g.score}</div>
                    </div>
                    <div class="history-date">${g.date}</div>
                </div>`;
            });
            document.getElementById('modalContainer').innerHTML=`
                <div class="modal"><div class="modal-content">
                    <h2 style="margin-bottom:15px;">📊 Your Scoreboard</h2>
                    <div class="scoreboard-stats">
                        <div class="stat-card"><div class="number">${history.length}</div><div>Total Games</div></div>
                        <div class="stat-card"><div class="number">${totalScore}</div><div>Total Score</div></div>
                    </div>
                    <h3 style="margin:12px 0 10px;">Recent Games</h3>
                    ${hHtml}
                    <button class="play-again-btn" onclick="closeModal()" style="background:linear-gradient(135deg,#555,#333);">Close</button>
                </div></div>`;
        }

        function shuffle(arr) {
            for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
            return arr;
        }

        function closeModal() { document.getElementById('modalContainer').innerHTML=''; }
    </script>
</body>
</html>
