<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SK Education World - Math Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        :root {
            --primary: #4CAF50;
            --primary-dark: #2E7D32;
            --secondary: #2196F3;
            --warning: #FF9800;
            --danger: #f44336;
            --dark: #333;
            --light: #f5f5f5;
            --white: #fff;
        }

        body {
            background: var(--white);
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0 20px;
            background: var(--white);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 22px;
        }

        .welcome-text {
            font-size: 15px;
            color: #666;
        }

        .welcome-text span {
            color: var(--primary);
            font-size: 18px;
            font-weight: 700;
            display: block;
        }

        .menu-icon {
            cursor: pointer;
            padding: 10px;
            background: var(--light);
            border-radius: 14px;
        }

        .menu-icon span {
            display: block;
            width: 22px;
            height: 3px;
            background: var(--dark);
            margin: 4px 0;
            border-radius: 3px;
        }

        /* Menu */
        .menu-dropdown {
            position: fixed;
            top: 80px;
            right: 16px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 8px;
            display: none;
            z-index: 1000;
            min-width: 220px;
        }

        .menu-dropdown.active {
            display: block;
        }

        .menu-dropdown a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            text-decoration: none;
            color: var(--dark);
            border-radius: 18px;
            cursor: pointer;
        }

        .menu-dropdown a:hover {
            background: var(--light);
        }

        /* Sections */
        .section-title {
            font-size: 24px;
            margin: 20px 0 15px;
            font-weight: 700;
            padding-left: 16px;
            border-left: 6px solid var(--primary);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .category-card {
            background: var(--white);
            border-radius: 24px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .category-card:active {
            transform: scale(0.97);
        }

        .category-icon {
            font-size: 42px;
            margin-bottom: 10px;
            display: block;
        }

        .category-name {
            font-weight: 600;
            color: var(--dark);
        }

        .category-card.calculator-card {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            grid-column: span 2;
        }

        .category-card.calculator-card .category-name {
            color: white;
        }

        /* Level Selection */
        .level-selection {
            background: var(--white);
            border-radius: 32px;
            padding: 30px 24px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .level-title {
            text-align: center;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 700;
        }

        .level-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .level-btn {
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .level-btn.easy { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
        .level-btn.medium { background: linear-gradient(135deg, #FF9800, #F57C00); }
        .level-btn.hard { background: linear-gradient(135deg, #f44336, #C62828); }

        .level-range {
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 40px;
        }

        .back-btn {
            margin-top: 20px;
            padding: 16px;
            border: none;
            background: var(--light);
            border-radius: 18px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Calculator */
        .calculator-section {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .calculator-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.05);
            padding: 5px;
            border-radius: 18px;
        }

        .calc-tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            color: rgba(255,255,255,0.5);
            transition: all 0.25s;
            font-family: 'Nunito', sans-serif;
        }

        .calc-tab.active {
            background: linear-gradient(135deg, #2ECC71, #1a8a4a);
            color: white;
            box-shadow: 0 4px 15px rgba(46,204,113,0.3);
        }

        .calculator {
            background: #0d1117;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.07);
        }

        .calc-display {
            background: linear-gradient(135deg, #0a0a1a, #111827);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 14px;
            text-align: right;
            font-size: 34px;
            font-weight: 800;
            min-height: 72px;
            word-wrap: break-word;
            border: 1px solid rgba(255,255,255,0.08);
            color: #2ECC71;
            font-family: 'Nunito', monospace;
            letter-spacing: 1px;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 9px;
        }

        .algebra-calc .calc-buttons {
            grid-template-columns: repeat(3, 1fr);
        }

        .calc-btn {
            padding: 18px 8px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            background: rgba(255,255,255,0.07);
            color: white;
            transition: all 0.15s;
            border: 1px solid rgba(255,255,255,0.05);
            font-family: 'Nunito', sans-serif;
        }

        .calc-btn:active {
            transform: scale(0.93);
            background: rgba(255,255,255,0.15);
        }

        .calc-btn.operator { background: linear-gradient(135deg,rgba(230,126,34,0.3),rgba(211,84,0,0.3)); color: #E67E22; border-color: rgba(230,126,34,0.3); }
        .calc-btn.equals { background: linear-gradient(135deg,#2ECC71,#1a8a4a); color: white; grid-column: span 2; border-color: transparent; box-shadow: 0 4px 15px rgba(46,204,113,0.25); }
        .calc-btn.clear { background: linear-gradient(135deg,rgba(231,76,60,0.3),rgba(192,57,43,0.3)); color: #e74c3c; border-color: rgba(231,76,60,0.3); }
        .calc-btn.function { background: linear-gradient(135deg,rgba(52,152,219,0.3),rgba(25,118,210,0.3)); color: #3498DB; border-color: rgba(52,152,219,0.3); }

        .algebra-calc .calc-btn.equals { grid-column: span 3; }

        /* Game Area */
        .game-area {
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .timer {
            font-size: 32px;
            font-weight: 800;
            color: var(--danger);
            background: #FFEBEE;
            padding: 12px 24px;
            border-radius: 60px;
        }

        .timer.warning {
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .progress {
            background: #E8F5E9;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: var(--primary);
        }

        .question-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 50px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            text-align: center;
        }

        .question-text {
            color: white;
            font-size: 48px;
            font-weight: 800;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 22px;
            padding: 22px 10px;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
        }

        .option-btn:active {
            transform: scale(0.96);
        }

        .option-btn.correct { background: #4CAF50; color: white; border-color: #4CAF50; }
        .option-btn.wrong { background: #f44336; color: white; border-color: #f44336; }
        .option-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .action-buttons {
            display: flex;
            gap: 14px;
        }

        .skip-btn, .submit-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 22px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            color: white;
        }

        .skip-btn { background: linear-gradient(135deg, #FF9800, #F57C00); }
        .submit-btn { background: linear-gradient(135deg, #2196F3, #1976D2); }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 32px 24px;
            border-radius: 40px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .stat {
            font-size: 18px;
            margin: 12px 0;
            padding: 14px;
            border-radius: 18px;
            font-weight: 600;
        }

        .stat.correct { background: #E8F5E9; color: #2E7D32; }
        .stat.wrong { background: #FFEBEE; color: #C62828; }
        .stat.skipped { background: #FFF3E0; color: #EF6C00; }
        .stat.score { background: #E3F2FD; color: #1565C0; }

        .play-again-btn {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 18px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        /* Scoreboard */
        .scoreboard-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 800;
        }

        .history-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 22px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .history-category {
            font-weight: 700;
            color: var(--dark);
        }

        .history-difficulty {
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .history-difficulty.easy { background: #E8F5E9; color: #2E7D32; }
        .history-difficulty.medium { background: #FFF3E0; color: #EF6C00; }
        .history-difficulty.hard { background: #FFEBEE; color: #C62828; }

        .history-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .history-stat {
            text-align: center;
            padding: 8px;
            background: white;
            border-radius: 14px;
            font-weight: 600;
            font-size: 13px;
        }

        .history-date {
            font-size: 11px;
            color: #999;
            text-align: right;
        }

        .clear-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo-container">
            <div class="logo">SK</div>
            <div class="welcome-text">
                Welcome to
                <span>SK_education_world</span>
            </div>
        </div>
        <div class="menu-icon" id="menuIcon">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Menu -->
    <div class="menu-dropdown" id="menuDropdown">
        <a onclick="showScoreboard(); toggleMenu();">📊 Your Scoreboard</a>
        <a onclick="clearAllHistory(); toggleMenu();">🗑️ Clear History</a>
        <a onclick="window.location.href='dashboard.html'">🏠 My Dashboard</a>
        <a onclick="doLogout()">🚪 Logout</a>
    </div>

    <!-- Main Content Container -->
    <div id="mainContent"></div>

    <!-- Modals Container -->
    <div id="modalContainer"></div>

    <script>
        // ==================== GAME STATE ====================
        const GameState = {
            currentCategory: '',
            currentDifficulty: '',
            score: 0,
            correct: 0,
            wrong: 0,
            skipped: 0,
            questionCount: 0,
            timer: null,
            timeLeft: 20,
            currentQuestion: null,
            categories: [
                { id: 1, name: 'Square Root', icon: '√', color: '#4CAF50' },
                { id: 2, name: 'Cube Root', icon: '∛', color: '#2196F3' },
                { id: 3, name: 'Square Numbers', icon: 'x²', color: '#FF9800' },
                { id: 4, name: 'Cube Numbers', icon: 'x³', color: '#9C27B0' },
                { id: 5, name: 'Calculator', icon: '🧮', isCalculator: true }
            ],
            calculator: {
                normalExpr: '',
                algebraExpr: ''
            }
        };

        // ==================== INITIALIZATION ====================
        function initApp() {
            renderCategories();
            attachEventListeners();
        }

        function attachEventListeners() {
            // Menu toggle
            document.getElementById('menuIcon').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMenu();
            });

            // Close menu on outside click
            document.addEventListener('click', () => {
                document.getElementById('menuDropdown').classList.remove('active');
            });

            // Prevent menu close when clicking inside
            document.getElementById('menuDropdown').addEventListener('click', (e) => {
                e.stopPropagation();
            });
        }

        // ==================== RENDERING FUNCTIONS ====================
        function renderCategories() {
            const mainContent = document.getElementById('mainContent');
            let html = `
                <h2 class="section-title">Choose Category</h2>
                <div class="categories-grid">
            `;
            
            GameState.categories.forEach(cat => {
                if (cat.isCalculator) {
                    html += `
                        <div class="category-card calculator-card" onclick="openCalculator()">
                            <span class="category-icon">${cat.icon}</span>
                            <div class="category-name">${cat.name}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="category-card" onclick="selectCategory('${cat.name}')">
                            <span class="category-icon" style="color: ${cat.color}">${cat.icon}</span>
                            <div class="category-name">${cat.name}</div>
                        </div>
                    `;
                }
            });
            
            html += `</div>`;
            mainContent.innerHTML = html;
        }

        function renderLevelSelection(category) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="level-selection">
                    <h3 class="level-title">${category} - Select Level</h3>
                    <div class="level-buttons">
                        <button class="level-btn easy" onclick="startGame('easy')">
                            Easy <span class="level-range">1-20</span>
                        </button>
                        <button class="level-btn medium" onclick="startGame('medium')">
                            Medium <span class="level-range">21-50</span>
                        </button>
                        <button class="level-btn hard" onclick="startGame('hard')">
                            Hard <span class="level-range">51-100</span>
                        </button>
                    </div>
                    <button class="back-btn" onclick="backToMain()">← Back</button>
                </div>
            `;
        }

        function renderGame() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="game-area">
                    <div class="game-header">
                        <div class="timer" id="timer">20s</div>
                        <div class="progress">Q<span id="currentQ">1</span>/∞</div>
                    </div>
                    <div class="question-card">
                        <div class="question-text" id="questionText">Loading...</div>
                    </div>
                    <div class="options-grid" id="optionsGrid"></div>
                    <div class="action-buttons">
                        <button class="skip-btn" onclick="skipQuestion()">⏭️ Skip</button>
                        <button class="submit-btn" onclick="endQuiz()">📥 Submit Quiz</button>
                    </div>
                </div>
            `;
            
            // Reset game state
            GameState.score = 0;
            GameState.correct = 0;
            GameState.wrong = 0;
            GameState.skipped = 0;
            GameState.questionCount = 0;
            
            generateNewQuestion();
        }

        function renderCalculator() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="calculator-section">
                    <div class="calculator-tabs">
                        <button class="calc-tab active" onclick="switchCalculator('normal')">🧮 Normal</button>
                        <button class="calc-tab" onclick="switchCalculator('algebra')">🔢 Algebra</button>
                    </div>
                    
                    <div class="calculator normal-calc" id="normalCalc">
                        <div class="calc-display" id="normalDisplay">0</div>
                        <div class="calc-buttons" id="normalButtons"></div>
                    </div>

                    <div class="calculator algebra-calc hidden" id="algebraCalc">
                        <div class="calc-display" id="algebraDisplay">0</div>
                        <div class="calc-buttons" id="algebraButtons"></div>
                    </div>

                    <button class="back-btn" onclick="backToMain()" style="margin-top: 20px;">← Back to Main</button>
                </div>
            `;
            
            renderNormalCalculator();
            renderAlgebraCalculator();
            resetCalculators();
        }

        function renderNormalCalculator() {
            const buttons = [
                ['C', '(', ')', '÷'],
                ['7', '8', '9', '×'],
                ['4', '5', '6', '-'],
                ['1', '2', '3', '+'],
                ['0', '.', '⌫', '=']
            ];
            
            const container = document.getElementById('normalButtons');
            let html = '';
            
            buttons.forEach(row => {
                row.forEach(btn => {
                    let className = 'calc-btn';
                    if (btn === 'C') className += ' clear';
                    else if (btn === '=') className += ' equals';
                    else if (['+', '-', '×', '÷'].includes(btn)) className += ' operator';
                    else if (btn === '⌫') className += ' function';
                    
                    html += `<button class="${className}" onclick="handleNormalCalc('${btn}')">${btn}</button>`;
                });
            });
            
            container.innerHTML = html;
        }

        function renderAlgebraCalculator() {
            const buttons = [
                ['C', '7', '8', '9', 'x²'],
                ['x³', '4', '5', '6', '√x'],
                ['∛x', '1', '2', '3', '+'],
                ['-', '0', '.', '⌫', '×'],
                ['÷', '=', '', '', '']
            ];
            
            const container = document.getElementById('algebraButtons');
            let html = '';
            
            buttons.flat().forEach(btn => {
                if (btn) {
                    let className = 'calc-btn';
                    if (btn === 'C') className += ' clear';
                    else if (btn === '=') className += ' equals';
                    else if (['+', '-', '×', '÷'].includes(btn)) className += ' operator';
                    else if (['x²', 'x³', '√x', '∛x', '⌫'].includes(btn)) className += ' function';
                    
                    html += `<button class="${className}" onclick="handleAlgebraCalc('${btn}')">${btn}</button>`;
                }
            });
            
            container.innerHTML = html;
        }

        function renderResult() {
            const modalContainer = document.getElementById('modalContainer');
            modalContainer.innerHTML = `
                <div class="modal">
                    <div class="modal-content">
                        <h2>🎉 Quiz Complete!</h2>
                        <div class="stat correct">✅ Correct: <span>${GameState.correct}</span></div>
                        <div class="stat wrong">❌ Wrong: <span>${GameState.wrong}</span></div>
                        <div class="stat skipped">⏭️ Skipped: <span>${GameState.skipped}</span></div>
                        <div class="stat score">⭐ Score: <span>${GameState.score}</span></div>
                        <button class="play-again-btn" onclick="playAgain()">Play Again</button>
                    </div>
                </div>
            `;
        }

        function renderScoreboard() {
            const history = getGameHistory();
            const modalContainer = document.getElementById('modalContainer');
            
            if (history.length === 0) {
                modalContainer.innerHTML = `
                    <div class="modal">
                        <div class="modal-content">
                            <h2>📊 Your Scoreboard</h2>
                            <div style="text-align:center; padding:30px;">No games yet! Play some quizzes 🎮</div>
                            <button class="play-again-btn" onclick="closeModal()">Close</button>
                        </div>
                    </div>
                `;
                return;
            }
            
            let totalScore = 0, totalGames = history.length;
            history.forEach(game => totalScore += game.score || 0);
            
            let historyHtml = '';
            history.slice(0, 10).forEach(game => {
                historyHtml += `
                    <div class="history-item">
                        <div class="history-header">
                            <span class="history-category">${game.category}</span>
                            <span class="history-difficulty ${game.difficulty}">${game.difficulty}</span>
                        </div>
                        <div class="history-stats">
                            <div class="history-stat" style="color:#4CAF50;">✅ ${game.correct}</div>
                            <div class="history-stat" style="color:#f44336;">❌ ${game.wrong}</div>
                            <div class="history-stat" style="color:#FF9800;">⏭️ ${game.skipped}</div>
                            <div class="history-stat" style="color:#2196F3;">⭐ ${game.score}</div>
                        </div>
                        <div class="history-date">${game.date}</div>
                    </div>
                `;
            });
            
            modalContainer.innerHTML = `
                <div class="modal">
                    <div class="modal-content">
                        <h2>📊 Your Scoreboard</h2>
                        <div class="scoreboard-stats">
                            <div class="stat-card">
                                <div class="number">${totalGames}</div>
                                <div>Total Games</div>
                            </div>
                            <div class="stat-card">
                                <div class="number">${totalScore}</div>
                                <div>Total Score</div>
                            </div>
                        </div>
                        <h3 style="margin:15px 0;">Recent Games</h3>
                        ${historyHtml}
                        <button class="play-again-btn" onclick="closeModal()">Close</button>
                        <button class="clear-btn" onclick="clearHistory()">Clear All History</button>
                    </div>
                </div>
            `;
        }

        // ==================== GAME FUNCTIONS ====================
        function selectCategory(category) {
            GameState.currentCategory = category;
            renderLevelSelection(category);
        }

        function backToMain() {
            if (GameState.timer) clearInterval(GameState.timer);
            renderCategories();
        }

        function startGame(difficulty) {
            GameState.currentDifficulty = difficulty;
            renderGame();
        }

        function generateNewQuestion() {
            GameState.questionCount++;
            document.getElementById('currentQ').textContent = GameState.questionCount;
            
            let range;
            if (GameState.currentDifficulty === 'easy') range = { min: 1, max: 20 };
            else if (GameState.currentDifficulty === 'medium') range = { min: 21, max: 50 };
            else range = { min: 51, max: 100 };
            
            let num = Math.floor(Math.random() * (range.max - range.min + 1)) + range.min;
            let answer, questionText;
            
            switch(GameState.currentCategory) {
                case 'Square Root':
                    answer = num;
                    questionText = `√${num * num} = ?`;
                    break;
                case 'Cube Root':
                    let cubeNum = Math.floor(Math.random() * 10) + 1;
                    answer = cubeNum;
                    questionText = `∛${cubeNum * cubeNum * cubeNum} = ?`;
                    break;
                case 'Square Numbers':
                    answer = num * num;
                    questionText = `${num}² = ?`;
                    break;
                case 'Cube Numbers':
                    let smallNum = Math.floor(Math.random() * 10) + 1;
                    answer = smallNum * smallNum * smallNum;
                    questionText = `${smallNum}³ = ?`;
                    break;
            }
            
            let options = [answer];
            while(options.length < 4) {
                let offset = Math.floor(Math.random() * 10) - 5;
                if(offset === 0) offset = 1;
                let opt = answer + offset;
                if(opt > 0 && !options.includes(opt)) options.push(opt);
            }
            
            GameState.currentQuestion = {
                text: questionText,
                answer: answer,
                options: shuffleArray(options)
            };
            
            displayQuestion();
        }

        function shuffleArray(array) {
            for(let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function displayQuestion() {
            const q = GameState.currentQuestion;
            document.getElementById('questionText').textContent = q.text;
            
            let optionsHtml = '';
            q.options.forEach(opt => {
                optionsHtml += `<button class="option-btn" onclick="checkAnswer(${opt})">${opt}</button>`;
            });
            document.getElementById('optionsGrid').innerHTML = optionsHtml;
            
            startTimer();
        }

        function startTimer() {
            if (GameState.timer) clearInterval(GameState.timer);
            
            GameState.timeLeft = 20;
            document.getElementById('timer').textContent = GameState.timeLeft + 's';
            document.getElementById('timer').classList.remove('warning');
            
            GameState.timer = setInterval(() => {
                GameState.timeLeft--;
                document.getElementById('timer').textContent = GameState.timeLeft + 's';
                
                if(GameState.timeLeft <= 5) {
                    document.getElementById('timer').classList.add('warning');
                }
                
                if(GameState.timeLeft <= 0) {
                    clearInterval(GameState.timer);
                    timeOut();
                }
            }, 1000);
        }

        function checkAnswer(selected) {
            clearInterval(GameState.timer);
            
            const q = GameState.currentQuestion;
            const options = document.querySelectorAll('.option-btn');
            
            options.forEach(opt => opt.disabled = true);
            
            if(selected == q.answer) {
                event.target.classList.add('correct');
                GameState.correct++;
                GameState.score += 10;
            } else {
                event.target.classList.add('wrong');
                GameState.wrong++;
                options.forEach(opt => {
                    if(parseFloat(opt.textContent) == q.answer) {
                        opt.classList.add('correct');
                    }
                });
            }
            
            setTimeout(() => generateNewQuestion(), 800);
        }

        function timeOut() {
            GameState.wrong++;
            const q = GameState.currentQuestion;
            const options = document.querySelectorAll('.option-btn');
            
            options.forEach(opt => opt.disabled = true);
            options.forEach(opt => {
                if(parseFloat(opt.textContent) == q.answer) {
                    opt.classList.add('correct');
                }
            });
            
            setTimeout(() => generateNewQuestion(), 800);
        }

        function skipQuestion() {
            clearInterval(GameState.timer);
            GameState.skipped++;
            
            const q = GameState.currentQuestion;
            const options = document.querySelectorAll('.option-btn');
            
            options.forEach(opt => opt.disabled = true);
            options.forEach(opt => {
                if(parseFloat(opt.textContent) == q.answer) {
                    opt.classList.add('correct');
                }
            });
            
            setTimeout(() => generateNewQuestion(), 600);
        }

        function endQuiz() {
            clearInterval(GameState.timer);
            saveGameToStorage();
            renderResult();
        }

        function playAgain() {
            closeModal();
            backToMain();
        }

        // ==================== CALCULATOR FUNCTIONS ====================
        function openCalculator() {
            renderCalculator();
        }

        function switchCalculator(type) {
            document.getElementById('normalCalc').classList.toggle('hidden', type !== 'normal');
            document.getElementById('algebraCalc').classList.toggle('hidden', type !== 'algebra');
            document.querySelectorAll('.calc-tab').forEach(tab => {
                tab.classList.toggle('active', tab.textContent.includes(type === 'normal' ? 'Normal' : 'Algebra'));
            });
        }

        function resetCalculators() {
            GameState.calculator.normalExpr = '';
            GameState.calculator.algebraExpr = '';
            document.getElementById('normalDisplay').textContent = '0';
            document.getElementById('algebraDisplay').textContent = '0';
        }

        function handleNormalCalc(btn) {
            if (btn === 'C') {
                GameState.calculator.normalExpr = '';
                document.getElementById('normalDisplay').textContent = '0';
            } else if (btn === '⌫') {
                GameState.calculator.normalExpr = GameState.calculator.normalExpr.slice(0, -1);
                document.getElementById('normalDisplay').textContent = GameState.calculator.normalExpr || '0';
            } else if (btn === '=') {
                try {
                    let expr = GameState.calculator.normalExpr.replace(/×/g, '*').replace(/÷/g, '/');
                    let result = eval(expr);
                    document.getElementById('normalDisplay').textContent = result;
                    GameState.calculator.normalExpr = result.toString();
                } catch {
                    document.getElementById('normalDisplay').textContent = 'Error';
                    GameState.calculator.normalExpr = '';
                }
            } else {
                GameState.calculator.normalExpr += btn;
                document.getElementById('normalDisplay').textContent = GameState.calculator.normalExpr;
            }
        }

        function handleAlgebraCalc(btn) {
            if (btn === 'C') {
                GameState.calculator.algebraExpr = '';
                document.getElementById('algebraDisplay').textContent = '0';
            } else if (btn === '⌫') {
                GameState.calculator.algebraExpr = GameState.calculator.algebraExpr.slice(0, -1);
                document.getElementById('algebraDisplay').textContent = GameState.calculator.algebraExpr || '0';
            } else if (btn === 'x²') {
                let num = parseFloat(GameState.calculator.algebraExpr) || 0;
                let result = num * num;
                document.getElementById('algebraDisplay').textContent = result;
                GameState.calculator.algebraExpr = result.toString();
            } else if (btn === 'x³') {
                let num = parseFloat(GameState.calculator.algebraExpr) || 0;
                let result = num * num * num;
                document.getElementById('algebraDisplay').textContent = result;
                GameState.calculator.algebraExpr = result.toString();
            } else if (btn === '√x') {
                let num = parseFloat(GameState.calculator.algebraExpr) || 0;
                if (num < 0) {
                    document.getElementById('algebraDisplay').textContent = 'Error';
                    GameState.calculator.algebraExpr = '';
                } else {
                    let result = Math.sqrt(num);
                    document.getElementById('algebraDisplay').textContent = result;
                    GameState.calculator.algebraExpr = result.toString();
                }
            } else if (btn === '∛x') {
                let num = parseFloat(GameState.calculator.algebraExpr) || 0;
                let result = Math.cbrt(num);
                document.getElementById('algebraDisplay').textContent = result;
                GameState.calculator.algebraExpr = result.toString();
            } else if (btn === '=') {
                try {
                    let expr = GameState.calculator.algebraExpr.replace(/×/g, '*').replace(/÷/g, '/');
                    let result = eval(expr);
                    document.getElementById('algebraDisplay').textContent = result;
                    GameState.calculator.algebraExpr = result.toString();
                } catch {
                    document.getElementById('algebraDisplay').textContent = GameState.calculator.algebraExpr || '0';
                }
            } else {
                GameState.calculator.algebraExpr += btn;
                document.getElementById('algebraDisplay').textContent = GameState.calculator.algebraExpr;
            }
        }

        // ==================== STORAGE FUNCTIONS ====================
        function saveGameToStorage() {
            const gameData = {
                id: Date.now(),
                category: GameState.currentCategory,
                difficulty: GameState.currentDifficulty,
                correct: GameState.correct,
                wrong: GameState.wrong,
                skipped: GameState.skipped,
                score: GameState.score,
                total: GameState.questionCount,
                date: new Date().toLocaleString()
            };
            
            let history = JSON.parse(localStorage.getItem('quizHistory')) || [];
            history.unshift(gameData);
            if (history.length > 50) history.pop();
            localStorage.setItem('quizHistory', JSON.stringify(history));
        }

        function getGameHistory() {
            return JSON.parse(localStorage.getItem('quizHistory')) || [];
        }

        function showScoreboard() {
            renderScoreboard();
        }

        function clearHistory() {
            if (confirm('Delete all game history?')) {
                localStorage.removeItem('quizHistory');
                closeModal();
                showScoreboard();
            }
        }

        function clearAllHistory() {
            clearHistory();
        }

        // ==================== UTILITY FUNCTIONS ====================
        function toggleMenu() {
            document.getElementById('menuDropdown').classList.toggle('active');
        }

        function closeModal() {
            document.getElementById('modalContainer').innerHTML = '';
        }

        _auth.onAuthStateChanged(user=>{

            _currentUser=user;
            initApp();
            // Update header with user name
            _db.ref('users/'+user.uid).get().then(snap=>{
                if(snap.exists()){
                    const d=snap.val();
                    document.querySelector('.welcome-text span').textContent=d.name||'Player';
                }
            });

        function doLogout(){
            if(confirm('Logout?')){ _auth.signOut().then(()=>window.location.href='login.html'); }
        }

        // Override saveGameToStorage to also sync to Firebase
        const _origSave=saveGameToStorage;
        function saveGameToStorage(){
            _origSave();
            if(_currentUser){
                const uid=_currentUser.uid;
                const gameData={
                    id:Date.now(),
                    category:GameState.currentCategory,
                    difficulty:GameState.currentDifficulty,
                    correct:GameState.correct,
                    wrong:GameState.wrong,
                    skipped:GameState.skipped,
                    score:GameState.score,
                    total:GameState.questionCount,
                    date:new Date().toLocaleString()
                };
                // Save to Firebase game history
                _db.ref('gameHistory/'+uid+'/'+gameData.id).set(gameData);
                // Update user totals
                _db.ref('users/'+uid).transaction(u=>{
                    if(u){
                        u.score=(u.score||0)+GameState.score;
                        u.gamesPlayed=(u.gamesPlayed||0)+1;
                        u.totalCorrect=(u.totalCorrect||0)+GameState.correct;
                        u.totalWrong=(u.totalWrong||0)+GameState.wrong;
                        u.totalSkipped=(u.totalSkipped||0)+GameState.skipped;
                    }
                    return u;
                });
                // Also save locally with uid key
                const history=JSON.parse(localStorage.getItem('quizHistory_'+uid))||[];
                history.unshift(gameData);
                if(history.length>50) history.pop();
                localStorage.setItem('quizHistory_'+uid,JSON.stringify(history));
            }
        }

        // Override getGameHistory to use uid key when logged in
        const _origGetHistory=getGameHistory;
        function getGameHistory(){
            if(_currentUser) return JSON.parse(localStorage.getItem('quizHistory_'+_currentUser.uid))||[];
            return _origGetHistory();
        }
    </script>
