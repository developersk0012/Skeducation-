<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SK Education World - Math Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        :root {
            --primary: #4CAF50;
            --primary-dark: #2E7D32;
            --secondary: #2196F3;
            --warning: #FF9800;
            --danger: #f44336;
            --dark: #333;
            --light: #f5f5f5;
            --white: #fff;
        }

        body {
            background: var(--white);
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0 20px;
            background: var(--white);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 22px;
        }

        .welcome-text {
            font-size: 15px;
            color: #666;
        }

        .welcome-text span {
            color: var(--primary);
            font-size: 18px;
            font-weight: 700;
            display: block;
        }

        .menu-icon {
            cursor: pointer;
            padding: 10px;
            background: var(--light);
            border-radius: 14px;
        }

        .menu-icon span {
            display: block;
            width: 22px;
            height: 3px;
            background: var(--dark);
            margin: 4px 0;
            border-radius: 3px;
        }

        /* Menu */
        .menu-dropdown {
            position: fixed;
            top: 80px;
            right: 16px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 8px;
            display: none;
            z-index: 1000;
            min-width: 220px;
        }

        .menu-dropdown.active {
            display: block;
        }

        .menu-dropdown a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            text-decoration: none;
            color: var(--dark);
            border-radius: 18px;
            cursor: pointer;
        }

        .menu-dropdown a:hover {
            background: var(--light);
        }

        /* Sections */
        .section-title {
            font-size: 24px;
            margin: 20px 0 15px;
            font-weight: 700;
            padding-left: 16px;
            border-left: 6px solid var(--primary);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .category-card {
            background: var(--white);
            border-radius: 24px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .category-card:active {
            transform: scale(0.97);
        }

        .category-icon {
            font-size: 42px;
            margin-bottom: 10px;
            display: block;
        }

        .category-name {
            font-weight: 600;
            color: var(--dark);
        }

        .category-card.calculator-card {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            grid-column: span 2;
        }

        .category-card.calculator-card .category-name {
            color: white;
        }

        /* Level Selection */
        .level-selection {
            background: var(--white);
            border-radius: 32px;
            padding: 30px 24px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .level-title {
            text-align: center;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 700;
        }

        .level-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .level-btn {
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .level-btn.easy { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
        .level-btn.medium { background: linear-gradient(135deg, #FF9800, #F57C00); }
        .level-btn.hard { background: linear-gradient(135deg, #f44336, #C62828); }

        .level-range {
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 40px;
        }

        .back-btn {
            margin-top: 20px;
            padding: 16px;
            border: none;
            background: var(--light);
            border-radius: 18px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Calculator */
        .calculator-section {
            background: linear-gradient(135deg, #2C3E50, #3498DB);
            border-radius: 32px;
            padding: 24px;
            margin: 20px 0;
        }

        .calculator-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .calc-tab {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .calc-tab.active {
            background: white;
            color: #2C3E50;
        }

        .calculator {
            background: white;
            border-radius: 28px;
            padding: 20px;
        }

        .calc-display {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 32px;
            font-weight: 700;
            min-height: 80px;
            word-wrap: break-word;
            border: 2px solid #e0e0e0;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .algebra-calc .calc-buttons {
            grid-template-columns: repeat(3, 1fr);
        }

        .calc-btn {
            padding: 20px 10px;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            background: #f8f9fa;
            color: var(--dark);
        }

        .calc-btn:active {
            transform: scale(0.95);
        }

        .calc-btn.operator { background: var(--warning); color: white; }
        .calc-btn.equals { background: var(--primary); color: white; grid-column: span 2; }
        .calc-btn.clear { background: var(--danger); color: white; }
        .calc-btn.function { background: var(--secondary); color: white; }

        .algebra-calc .calc-btn.equals { grid-column: span 3; }

        /* Game Area */
        .game-area {
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .timer {
            font-size: 32px;
            font-weight: 800;
            color: var(--danger);
            background: #FFEBEE;
            padding: 12px 24px;
            border-radius: 60px;
        }

        .timer.warning {
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .progress {
            background: #E8F5E9;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: var(--primary);
        }

        .question-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 50px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            text-align: center;
        }

        .question-text {
            color: white;
            font-size: 48px;
            font-weight: 800;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 22px;
            padding: 22px 10px;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
        }

        .option-btn:active {
            transform: scale(0.96);
        }

        .option-btn.correct { background: #4CAF50; color: white; border-color: #4CAF50; }
        .option-btn.wrong { background: #f44336; color: white; border-color: #f44336; }
        .option-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .action-buttons {
            display: flex;
            gap: 14px;
        }

        .skip-btn, .submit-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 22px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            color: white;
        }

        .skip-btn { background: linear-gradient(135deg, #FF9800, #F57C00); }
        .submit-btn { background: linear-gradient(135deg, #2196F3, #1976D2); }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 32px 24px;
            border-radius: 40px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .stat {
            font-size: 18px;
            margin: 12px 0;
            padding: 14px;
            border-radius: 18px;
            font-weight: 600;
        }

        .stat.correct { background: #E8F5E9; color: #2E7D32; }
        .stat.wrong { background: #FFEBEE; color: #C62828; }
        .stat.skipped { background: #FFF3E0; color: #EF6C00; }
        .stat.score { background: #E3F2FD; color: #1565C0; }

        .play-again-btn {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 18px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        /* Scoreboard */
        .scoreboard-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 800;
        }

        .history-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 22px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .history-category {
            font-weight: 700;
            color: var(--dark);
        }

        .history-difficulty {
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .history-difficulty.easy { background: #E8F5E9; color: #2E7D32; }
        .history-difficulty.medium { background: #FFF3E0; color: #EF6C00; }
        .history-difficulty.hard { background: #FFEBEE; color: #C62828; }

        .history-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .history-stat {
            text-align: center;
            padding: 8px;
            background: white;
            border-radius: 14px;
            font-weight: 600;
            font-size: 13px;
        }

        .history-date {
            font-size: 11px;
            color: #999;
            text-align: right;
        }

        .clear-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo-container">
            <div class="logo">SK</div>
            <div class="welcome-text">
                Welcome to
                <span>SK_education_world</span>
            </div>
        </div>
        <div class="menu-icon" id="menuIcon">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Menu -->
    <div class="menu-dropdown" id="menuDropdown">
        <a onclick="showScoreboard(); toggleMenu();">📊 Your Scoreboard</a>
        <a onclick="clearAllHistory(); toggleMenu();">🗑️ Clear History</a>
    </div>

    <!-- Main Content Container -->
    <div id="mainContent"></div>

    <!-- Modals Container -->
    <div id="modalContainer"></div>

    <script>
        // ==================== GAME STATE ====================
        const GameState = {
            currentCategory: '',
            currentDifficulty: '',
            score: 0,
            correct: 0,
            wrong: 0,
            skipped: 0,
            questionCount: 0,
            timer: null,
            timeLeft: 20,
            currentQuestion: null,
            categories: [
                { id: 1, name: 'Square Root', icon: '√', color: '#4CAF50' },
                { id: 2, name: 'Cube Root', icon: '∛', color: '#2196F3' },
                { id: 3, name: 'Square Numbers', icon: 'x²', color: '#FF9800' },
                { id: 4, name: 'Cube Numbers', icon: 'x³', color: '#9C27B0' },
                { id: 5, name: 'Calculator', icon: '🧮', isCalculator: true }
            ],
            calculator: {
                normalExpr: '',
                algebraExpr: ''
            }
        };

        // ==================== INITIALIZATION ====================
        function initApp() {
            renderCategories();
            attachEventListeners();
        }

        function attachEventListeners() {
            // Menu toggle
            document.getElementById('menuIcon').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMenu();
            });

            // Close menu on outside click
            document.addEventListener('click', () => {
                document.getElementById('menuDropdown').classList.remove('active');
            });

            // Prevent menu close when clicking inside
            document.getElementById('menuDropdown').addEventListener('click', (e) => {
                e.stopPropagation();
            });
        }

        // ==================== RENDERING FUNCTIONS ====================
        function renderCategories() {
            const mainContent = document.getElementById('mainContent');
            let html = `
                <h2 class="section-title">Choose Category</h2>
                <div class="categories-grid">
            `;
            
            GameState.categories.forEach(cat => {
                if (cat.isCalculator) {
                    html += `
                        <div class="category-card calculator-card" onclick="openCalculator()">
                            <span class="category-icon">${cat.icon}</span>
                            <div class="category-name">${cat.name}</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="category-card" onclick="selectCategory('${cat.name}')">
                            <span class="category-icon" style="color: ${cat.color}">${cat.icon}</span>
                            <div class="category-name">${cat.name}</div>
                        </div>
                    `;
                }
            });
            
            html += `</div>`;
            mainContent.innerHTML = html;
        }

        function renderLevelSelection(category) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="level-selection">
                    <h3 class="level-title">${category} - Select Level</h3>
                    <div class="level-buttons">
                        <button class="level-btn easy" onclick="startGame('easy')">
                            Easy <span class="level-range">1-20</span>
                        </button>
                        <button class="level-btn medium" onclick="startGame('medium')">
                            Medium <span class="level-range">21-50</span>
                        </button>
                        <button class="level-btn hard" onclick="startGame('hard')">
                            Hard <span class="level-range">51-100</span>
                        </button>
                    </div>
                    <button class="back-btn" onclick="backToMain()">← Back</button>
                </div>
            `;
        }

        function renderGame() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="game-area">
                    <div class="game-header">
                        <div class="timer" id="timer">20s</div>
                        <div class="progress">Q<span id="currentQ">1</span>/∞</div>
                    </div>
                    <div class="question-card">
                        <div class="question-text" id="questionText">Loading...</div>
                    </div>
                    <div class="options-grid" id="optionsGrid"></div>
                    <div class="action-buttons">
                        <button class="skip-btn" onclick="skipQuestion()">⏭️ Skip</button>
                        <button class="submit-btn" onclick="endQuiz()">📥 Submit Quiz</button>
                    </div>
