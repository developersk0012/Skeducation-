<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SK Education World - Math Quiz</title>
    <!-- CSS will be injected via JavaScript for better performance -->
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo-container">
            <div class="logo">SK</div>
            <div class="welcome-text">
                Welcome to
                <span>SK_education_world</span>
            </div>
        </div>
        <div class="menu-icon" id="menuIcon">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Menu -->
    <div class="menu-dropdown" id="menuDropdown">
        <a onclick="app.methods.showScoreboard(); app.methods.toggleMenu();">📊 Your Scoreboard</a>
        <a onclick="app.methods.clearAllHistory(); app.methods.toggleMenu();">🗑️ Clear History</a>
    </div>

    <!-- Main Content -->
    <div id="app"></div>

    <!-- Templates -->
    <template id="categories-template">
        <h2 class="section-title">Choose Category</h2>
        <div class="categories-grid" id="categoriesGrid"></div>
    </template>

    <template id="level-template">
        <div class="level-selection">
            <h3 class="level-title" id="selectedCategoryTitle">Select Level</h3>
            <div class="level-buttons">
                <button class="level-btn easy" data-level="easy">Easy <span class="level-range">1-20</span></button>
                <button class="level-btn medium" data-level="medium">Medium <span class="level-range">21-50</span></button>
                <button class="level-btn hard" data-level="hard">Hard <span class="level-range">51-100</span></button>
            </div>
            <button class="back-btn" id="backToMainBtn">← Back</button>
        </div>
    </template>

    <template id="game-template">
        <div class="game-area">
            <div class="game-header">
                <div class="timer" id="timer">20s</div>
                <div class="progress">Q<span id="currentQ">1</span>/∞</div>
            </div>
            <div class="question-card">
                <div class="question-text" id="questionText">Loading...</div>
            </div>
            <div class="options-grid" id="optionsGrid"></div>
            <div class="action-buttons">
                <button class="skip-btn" id="skipBtn">⏭️ Skip</button>
                <button class="submit-btn" id="submitBtn">📥 Submit Quiz</button>
            </div>
        </div>
    </template>

    <template id="calculator-template">
        <div class="calculator-section">
            <div class="calculator-tabs">
                <button class="calc-tab active" data-calc="normal">🧮 Normal</button>
                <button class="calc-tab" data-calc="algebra">🔢 Algebra</button>
            </div>
            <div class="calculator normal-calc" id="normalCalc">
                <div class="calc-display" id="normalDisplay">0</div>
                <div class="calc-buttons" id="normalButtons"></div>
            </div>
            <div class="calculator algebra-calc hidden" id="algebraCalc">
                <div class="calc-display" id="algebraDisplay">0</div>
                <div class="calc-buttons" id="algebraButtons"></div>
            </div>
            <button class="back-btn" id="backFromCalcBtn">← Back to Main</button>
        </div>
    </template>

    <template id="result-template">
        <div class="modal">
            <div class="modal-content">
                <h2>🎉 Quiz Complete!</h2>
                <div class="stat correct">✅ Correct: <span id="correctCount">0</span></div>
                <div class="stat wrong">❌ Wrong: <span id="wrongCount">0</span></div>
                <div class="stat skipped">⏭️ Skipped: <span id="skippedCount">0</span></div>
                <div class="stat score">⭐ Score: <span id="totalScore">0</span></div>
                <button class="play-again-btn" id="playAgainBtn">Play Again</button>
            </div>
        </div>
    </template>

    <template id="scoreboard-template">
        <div class="modal">
            <div class="modal-content">
                <h2>📊 Your Scoreboard</h2>
                <div id="scoreboardContent"></div>
                <button class="play-again-btn" id="closeScoreboardBtn">Close</button>
                <button class="clear-btn" id="clearHistoryBtn">Clear All History</button>
            </div>
        </div>
    </template>

    <!-- Styles and Scripts -->
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</body>
</html>
