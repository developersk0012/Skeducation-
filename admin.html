<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#2ECC71;--green-dark:#1a8a4a;--red:#e74c3c;--blue:#3498DB;
  --dark:#0a0a1a;--card:#16213e;--white:#fff;
}
body{font-family:'Nunito',sans-serif;background:var(--dark);color:white;min-height:100vh;}
#adminLogin{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#0d1b2a,#0a0a1a);
}
.login-card{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:28px;padding:36px 28px;width:100%;max-width:380px;
  backdrop-filter:blur(10px);text-align:center;
}
.admin-icon{font-size:52px;margin-bottom:12px;}
.login-title{font-size:24px;font-weight:900;font-family:'Poppins',sans-serif;margin-bottom:4px;}
.login-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px;}
.admin-input{
  width:100%;padding:16px;border:2px solid rgba(255,255,255,0.1);
  border-radius:16px;background:rgba(255,255,255,0.06);color:white;
  font-size:16px;font-family:'Nunito',sans-serif;font-weight:600;
  outline:none;margin-bottom:14px;text-align:center;letter-spacing:4px;
}
.admin-input:focus{border-color:var(--green);}
.admin-btn{
  width:100%;padding:16px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:white;font-size:16px;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;
}
#adminPanel{display:none;}
.admin-header{
  padding:18px 24px;
  background:linear-gradient(135deg,var(--green-dark),#0d2b1a);
  border-bottom:1px solid rgba(46,204,113,0.2);
  display:flex;justify-content:space-between;align-items:center;
}
.admin-logo{display:flex;align-items:center;gap:12px;}
.a-logo-box{
  width:44px;height:44px;background:linear-gradient(135deg,var(--green),var(--green-dark));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:16px;font-family:'Poppins',sans-serif;
}
.admin-title{font-size:18px;font-weight:900;}
.logout-btn{
  padding:8px 16px;border:1px solid rgba(231,76,60,0.4);border-radius:10px;
  background:transparent;color:var(--red);cursor:pointer;font-weight:700;font-size:13px;
  font-family:'Nunito',sans-serif;
}
.stats-bar{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  padding:16px 24px;
}
.stat-box{
  background:var(--card);border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;padding:14px;text-align:center;
}
.stat-box .n{font-size:26px;font-weight:900;color:var(--green);}
.stat-box .l{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.section{padding:0 24px 24px;}
.sec-title{
  font-size:15px;font-weight:800;color:rgba(255,255,255,0.7);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;
  padding-left:10px;border-left:3px solid var(--green);
}
.user-card{
  background:var(--card);border:1px solid rgba(255,255,255,0.07);
  border-radius:18px;padding:16px;margin-bottom:12px;
}
.user-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.user-name{font-size:16px;font-weight:800;}
.user-score{
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:white;padding:4px 12px;border-radius:30px;font-size:13px;font-weight:700;
}
.user-info{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:10px;line-height:1.7;}
.user-actions{display:flex;gap:8px;flex-wrap:wrap;}
.ua-btn{
  padding:8px 14px;border:none;border-radius:10px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;
}
.ua-view{background:rgba(52,152,219,0.2);color:#3498DB;border:1px solid rgba(52,152,219,0.3);}
.ua-pdf{background:rgba(230,126,34,0.2);color:#E67E22;border:1px solid rgba(230,126,34,0.3);}
.ua-del{background:rgba(231,76,60,0.2);color:var(--red);border:1px solid rgba(231,76,60,0.3);}
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  display:none;align-items:center;justify-content:center;z-index:2000;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:#16213e;border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;padding:24px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;
  animation:mPop 0.25s ease;
}
@keyframes mPop{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;}
.history-item{
  background:rgba(255,255,255,0.05);border-radius:14px;
  padding:12px;margin-bottom:8px;
}
.h-header{display:flex;justify-content:space-between;margin-bottom:6px;}
.h-cat{font-weight:700;font-size:13px;}
.diff-pill{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.diff-pill.easy{background:rgba(46,204,113,0.2);color:var(--green);}
.diff-pill.medium{background:rgba(230,126,34,0.2);color:#E67E22;}
.diff-pill.hard{background:rgba(231,76,60,0.2);color:var(--red);}
.h-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:6px;}
.h-stat{text-align:center;background:rgba(255,255,255,0.05);border-radius:8px;padding:5px;font-size:11px;font-weight:700;}
.h-date{font-size:9px;color:rgba(255,255,255,0.3);text-align:right;margin-top:4px;}
.close-btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:rgba(255,255,255,0.08);color:white;font-size:14px;
  font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:12px;
}
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:white;color:#1a2a1e;padding:12px 22px;border-radius:50px;
  font-weight:700;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,0.3);
  z-index:9999;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-left:4px solid #2ECC71;}
.toast.error{border-left:4px solid #e74c3c;}
.empty-state{text-align:center;padding:30px;color:rgba(255,255,255,0.3);font-size:14px;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- ADMIN LOGIN -->
<div id="adminLogin">
  <div class="login-card">
    <div class="admin-icon">🛡️</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">SK Education World</div>
    <input type="password" class="admin-input" id="adminPass" placeholder="••••••" onkeydown="if(event.key==='Enter')checkAdmin()">
    <button class="admin-btn" onclick="checkAdmin()">Enter Admin Panel</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-header">
    <div class="admin-logo">
      <div class="a-logo-box">SK</div>
      <div>
        <div class="admin-title">Admin Panel</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.5);">SK Education World</div>
      </div>
    </div>
    <button class="logout-btn" onclick="adminLogout()">🚪 Logout</button>
  </div>

  <div class="stats-bar">
    <div class="stat-box"><div class="n" id="totalUsersN">0</div><div class="l">👥 Total Users</div></div>
    <div class="stat-box"><div class="n" id="totalScoreN" style="color:#3498DB;">0</div><div class="l">⭐ Total Score</div></div>
    <div class="stat-box"><div class="n" id="topScoreN" style="color:#E67E22;">0</div><div class="l">🏆 Top Score</div></div>
  </div>

  <div class="section">
    <div class="sec-title">All Users</div>
    <div id="usersList"><div class="empty-state">Loading users...</div></div>
  </div>
</div>

<!-- SCOREBOARD MODAL -->
<div class="modal-overlay" id="sbModal">
  <div class="modal-box">
    <div class="modal-title" id="sbModalTitle">📊 Scoreboard</div>
    <div id="sbModalContent"></div>
    <button class="close-btn" onclick="closeModal('sbModal')">Close</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyADzxE7HmL1Z9A7VM_VWo9I5Z2Y6_aZERk",
  authDomain:"my-game-17edb.firebaseapp.com",
  databaseURL:"https://my-game-17edb-default-rtdb.firebaseio.com",
  projectId:"my-game-17edb",
  storageBucket:"my-game-17edb.firebasestorage.app",
  appId:"1:980626912031:android:ae22c6a423ab33e76ef62a"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let allUsersData=[];
const ADMIN_PASS='shima';

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}
function closeModal(id){document.getElementById(id).classList.remove('show');}

function checkAdmin(){
  const pass=document.getElementById('adminPass').value;
  if(pass===ADMIN_PASS){
    document.getElementById('adminLogin').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    loadAllUsers();
  } else {
    showToast('❌ Wrong password','error');
    document.getElementById('adminPass').value='';
  }
}

function adminLogout(){
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('adminLogin').style.display='flex';
  document.getElementById('adminPass').value='';
}

async function loadAllUsers(){
  const snap=await db.ref('users').orderByChild('score').get();
  allUsersData=[];
  if(snap.exists()) snap.forEach(c=>allUsersData.push({...c.val(),_key:c.key}));
  allUsersData.sort((a,b)=>(b.score||0)-(a.score||0));
  
  const totalScore=allUsersData.reduce((s,u)=>s+(u.score||0),0);
  const topScore=allUsersData[0]?.score||0;
  document.getElementById('totalUsersN').textContent=allUsersData.length;
  document.getElementById('totalScoreN').textContent=totalScore;
  document.getElementById('topScoreN').textContent=topScore;
  
  const ul=document.getElementById('usersList');
  if(!allUsersData.length){ ul.innerHTML='<div class="empty-state">No users yet</div>'; return; }
  
  ul.innerHTML=allUsersData.map((u,i)=>`
    <div class="user-card" id="uc_${u.uid}">
      <div class="user-top">
        <div>
          <div class="user-name">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)} ${u.name}</div>
        </div>
        <div class="user-score">⭐ ${u.score||0}</div>
      </div>
      <div class="user-info">
        📱 ${u.phone||'N/A'}<br>
        📧 ${u.email||'N/A'}<br>
        🎮 ${u.gamesPlayed||0} games played
      </div>
      <div class="user-actions">
        <button class="ua-btn ua-view" onclick="viewUserScore('${u.uid}')">📊 Scoreboard</button>
        <button class="ua-btn ua-pdf" onclick="downloadUserPDF('${u.uid}')">📄 PDF</button>
        <button class="ua-btn ua-del" onclick="deleteUser('${u.uid}','${u.name.replace(/'/g,'&apos;')}')">🗑️ Delete</button>
      </div>
    </div>
  `).join('');
}

function viewUserScore(uid){
  const user=allUsersData.find(u=>u.uid===uid);
  if(!user) return;
  const rank=allUsersData.findIndex(u=>u.uid===uid)+1;
  
  db.ref('gameHistory/'+uid).get().then(snap=>{
    let history=[];
    if(snap.exists()) snap.forEach(c=>history.push(c.val()));
    history.sort((a,b)=>b.id-a.id);
    document.getElementById('sbModalTitle').textContent='📊 '+user.name+' — Rank #'+rank;
    let html=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
        <div style="background:linear-gradient(135deg,#2ECC71,#1a8a4a);border-radius:14px;padding:12px;text-align:center;">
          <div style="font-size:22px;font-weight:900;">${user.score||0}</div>
          <div style="font-size:11px;opacity:0.85;">Total Score</div>
        </div>
        <div style="background:linear-gradient(135deg,#3498DB,#1976D2);border-radius:14px;padding:12px;text-align:center;">
          <div style="font-size:22px;font-weight:900;">#${rank}</div>
          <div style="font-size:11px;opacity:0.85;">Rank of ${allUsersData.length}</div>
        </div>
      </div>
    `;
    if(history.length){
      html+='<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:10px;">Recent Games</div>';
      history.slice(0,8).forEach(g=>{
        html+=`<div class="history-item">
          <div class="h-header"><span class="h-cat">${g.category}</span><span class="diff-pill ${g.difficulty}">${g.difficulty}</span></div>
          <div class="h-stats">
            <div class="h-stat">✅ ${g.correct}</div>
            <div class="h-stat">❌ ${g.wrong}</div>
            <div class="h-stat">⏭️ ${g.skipped}</div>
            <div class="h-stat" style="color:#2ECC71;">⭐ ${g.score}</div>
          </div>
          <div class="h-date">${g.date}</div>
        </div>`;
      });
    } else {
      html+='<div class="empty-state" style="padding:20px;">No game history available</div>';
    }
    document.getElementById('sbModalContent').innerHTML=html;
    document.getElementById('sbModal').classList.add('show');
  });
}

function downloadUserPDF(uid){
  const user=allUsersData.find(u=>u.uid===uid);
  if(!user){ showToast('User not found','error'); return; }
  const rank=allUsersData.findIndex(u=>u.uid===uid)+1;
  db.ref('gameHistory/'+uid).get().then(snap=>{
    let history=[];
    if(snap.exists()) snap.forEach(c=>history.push(c.val()));
    history.sort((a,b)=>b.id-a.id);
    generateAdminPDF(user, history, rank, allUsersData.length);
  });
}

function generateAdminPDF(user, history, rank, totalUsers){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,H=297;
  doc.setFillColor(10,10,26); doc.rect(0,0,W,H,'F');
  doc.setFillColor(46,204,113); doc.rect(0,0,W,45,'F');
  doc.setFillColor(255,255,255); doc.roundedRect(15,8,28,28,6,6,'F');
  doc.setTextColor(46,204,113); doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text('SK',29,25,{align:'center'});
  doc.setTextColor(255,255,255);
  doc.setFontSize(22); doc.setFont('helvetica','bold');
  doc.text('SK Education World 🌎',W/2,20,{align:'center'});
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text('Welcome to Our Website',W/2,32,{align:'center'});
  doc.setFillColor(26,42,30); doc.roundedRect(15,55,W-30,30,8,8,'F');
  doc.setFillColor(46,204,113); doc.roundedRect(15,55,4,30,2,2,'F');
  doc.setTextColor(46,204,113); doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text('🎓  '+user.name,25,73);
  doc.setTextColor(180,220,195); doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.text('SK Education World Member',25,80);
  doc.setFillColor(22,33,62); doc.roundedRect(15,94,W-30,82,10,10,'F');
  doc.setFillColor(46,204,113); doc.roundedRect(15,94,4,82,2,2,'F');
  doc.setTextColor(46,204,113); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('ACCOUNT INFORMATION',30,108);
  doc.setDrawColor(46,204,113); doc.setLineWidth(0.3); doc.line(30,111,W-20,111);
  const rows=[['👤 Full Name',user.name],['📱 Phone',user.phone||'N/A'],['📧 Gmail',user.email||'N/A'],['📅 Joined',user.createdAt?new Date(user.createdAt).toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'}):'N/A']];
  rows.forEach((r,i)=>{
    const y=122+i*14;
    doc.setTextColor(120,180,140); doc.setFont('helvetica','bold'); doc.setFontSize(10);
    doc.text(r[0],30,y);
    doc.setTextColor(255,255,255); doc.setFont('helvetica','normal');
    doc.text(String(r[1]),100,y);
  });
  doc.setFillColor(46,204,113); doc.roundedRect(15,185,W/2-20,55,10,10,'F');
  doc.setFillColor(52,152,219); doc.roundedRect(W/2+5,185,W/2-20,55,10,10,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('🏆 Total Score',15+(W/2-20)/2,200,{align:'center'});
  doc.setFontSize(28); doc.text(String(user.score||0),15+(W/2-20)/2,218,{align:'center'});
  doc.setFontSize(11); doc.text('points',15+(W/2-20)/2,228,{align:'center'});
  doc.text('🥇 Your Rank',W/2+5+(W/2-20)/2,200,{align:'center'});
  doc.setFontSize(28); doc.text('#'+rank,W/2+5+(W/2-20)/2,218,{align:'center'});
  doc.setFontSize(11); doc.text('of '+totalUsers+' players',W/2+5+(W/2-20)/2,228,{align:'center'});
  doc.setFillColor(26,42,30); doc.roundedRect(15,250,W-30,25,8,8,'F');
  doc.setTextColor(46,204,113); doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text('You are now #'+rank+' Rank — Focus on Study! 📚',W/2,265,{align:'center'});
  if(history.length>0){
    doc.addPage();
    doc.setFillColor(10,10,26); doc.rect(0,0,W,H,'F');
    doc.setFillColor(46,204,113); doc.rect(0,0,W,20,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(14);
    doc.text('Game History — '+user.name,W/2,13,{align:'center'});
    let y=35;
    history.slice(0,10).forEach(g=>{
      doc.setFillColor(22,33,62); doc.roundedRect(15,y,W-30,28,6,6,'F');
      doc.setTextColor(46,204,113); doc.setFont('helvetica','bold'); doc.setFontSize(11);
      doc.text(g.category,25,y+10);
      doc.setTextColor(180,220,195); doc.setFont('helvetica','normal'); doc.setFontSize(9);
      doc.text('✅ '+g.correct+'  ❌ '+g.wrong+'  ⏭️ '+g.skipped+'  ⭐ '+g.score,25,y+19);
      doc.setTextColor(100,140,120); doc.setFontSize(8);
      doc.text(g.date,W-20,y+10,{align:'right'});
      doc.setTextColor(200,200,200); doc.setFontSize(9);
      doc.text(g.difficulty.toUpperCase(),W-20,y+19,{align:'right'});
      y+=33;
    });
  }
  doc.setTextColor(80,120,90); doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text('SK Education World — Admin Export — '+new Date().toLocaleString('en-IN'),W/2,H-8,{align:'center'});
  doc.save('Admin_'+user.name.replace(/ /g,'_')+'_Report.pdf');
  showToast('📄 PDF Downloaded!','success');
}

async function deleteUser(uid,name){
  if(!confirm('⚠️ Delete user "'+name+'"? This will permanently remove all their data!')){ return; }
  
  const btn = event?.target;
  if(btn) { btn.textContent = '⏳ Deleting...'; btn.disabled = true; }
  
  try{
    await db.ref('users/'+uid).remove();
    await db.ref('gameHistory/'+uid').remove();
    
    const phoneMapSnap = await db.ref('phoneMap').orderByChild('uid').equalTo(uid).get();
    if(phoneMapSnap.exists()) {
      phoneMapSnap.forEach(child => {
        db.ref('phoneMap/'+child.key).remove();
      });
    }
    
    showToast('🗑️ User "'+name+'" deleted successfully','success');
    allUsersData = allUsersData.filter(u=>u.uid!==uid);
    
    const el=document.getElementById('uc_'+uid);
    if(el){ el.style.opacity='0'; el.style.transform='scale(0.9)'; el.style.transition='all 0.3s'; 
      setTimeout(()=>el.remove(),300); 
    }
    
    const totalScore=allUsersData.reduce((s,u)=>s+(u.score||0),0);
    document.getElementById('totalUsersN').textContent=allUsersData.length;
    document.getElementById('totalScoreN').textContent=totalScore;
    document.getElementById('topScoreN').textContent=allUsersData[0]?.score||0;
    
  } catch(e){ 
    showToast('❌ Error: '+e.message,'error');
    console.error('Delete error:', e);
  } finally {
    if(btn) { btn.textContent = '🗑️ Delete'; btn.disabled = false; }
  }
}
</script>
</body>
</html>
