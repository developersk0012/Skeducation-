<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SK Education World - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#2ECC71;--primary-dark:#1a8a4a;
  --secondary:#3498DB;--warning:#E67E22;--danger:#e74c3c;
  --dark:#1a1a2e;--card-bg:#16213e;--card2:#0f3460;
  --white:#fff;--light:#e8f5f0;
  --shadow:0 8px 32px rgba(0,0,0,0.25);
}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(135deg,#0a0a1a 0%,#0d1b2a 50%,#0a1628 100%);
  min-height:100vh;color:var(--white);
  max-width:480px;margin:0 auto;
  padding-bottom:30px;
}
.dash-header{
  padding:20px 20px 10px;
  background:linear-gradient(180deg,rgba(46,204,113,0.1) 0%,transparent 100%);
  border-bottom:1px solid rgba(46,204,113,0.1);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(10px);
}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.logo-sm{
  width:46px;height:46px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;font-family:'Poppins',sans-serif;
  box-shadow:0 4px 15px rgba(46,204,113,0.35);
}
.greet{margin-left:12px;flex:1;}
.greet-sub{font-size:12px;color:rgba(255,255,255,0.5);}
.greet-name{font-size:17px;font-weight:800;color:var(--primary);}
.icon-btn{
  width:42px;height:42px;border-radius:12px;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;
}
.score-banner{
  margin:16px 20px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border-radius:24px;padding:20px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 8px 30px rgba(46,204,113,0.3);
  position:relative;overflow:hidden;
}
.score-banner::before{
  content:'🏆';position:absolute;right:-10px;top:-10px;
  font-size:80px;opacity:0.12;
}
.score-label{font-size:12px;color:rgba(255,255,255,0.8);text-transform:uppercase;letter-spacing:1px;}
.score-num{font-size:36px;font-weight:900;font-family:'Poppins',sans-serif;}
.rank-pill{
  background:rgba(255,255,255,0.2);padding:8px 16px;
  border-radius:40px;text-align:center;
}
.rank-num{font-size:24px;font-weight:900;}
.rank-label{font-size:11px;opacity:0.8;}
.stats-row{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;margin:0 20px 20px;
}
.stat-mini{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;padding:14px 10px;text-align:center;
}
.stat-mini-num{font-size:22px;font-weight:800;color:var(--primary);}
.stat-mini-lbl{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.section{margin:0 20px 20px;}
.sec-title{
  font-size:16px;font-weight:800;color:rgba(255,255,255,0.8);
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:12px;
  padding-left:10px;border-left:3px solid var(--primary);
}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 20px 20px;}
.action-btn{
  padding:18px 12px;border:none;border-radius:20px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:all 0.2s;
}
.action-btn:active{transform:scale(0.97);}
.action-btn .a-icon{font-size:28px;}
.btn-play{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 6px 20px rgba(46,204,113,0.3);}
.btn-score{background:linear-gradient(135deg,#3498DB,#1976D2);color:white;box-shadow:0 6px 20px rgba(52,152,219,0.3);}
.btn-pdf{background:linear-gradient(135deg,#E67E22,#D35400);color:white;box-shadow:0 6px 20px rgba(230,126,34,0.3);}
.btn-logout{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.1);}
.history-list{}
.history-item{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;padding:14px;margin-bottom:10px;
}
.history-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.history-cat{font-weight:700;font-size:14px;}
.diff-badge{
  padding:3px 10px;border-radius:30px;font-size:11px;font-weight:700;text-transform:capitalize;
}
.diff-badge.easy{background:rgba(46,204,113,0.2);color:var(--primary);}
.diff-badge.medium{background:rgba(230,126,34,0.2);color:#E67E22;}
.diff-badge.hard{background:rgba(231,76,60,0.2);color:var(--danger);}
.history-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px;}
.h-stat{
  text-align:center;background:rgba(255,255,255,0.05);
  border-radius:10px;padding:6px 4px;font-size:12px;font-weight:600;
}
.history-date{font-size:10px;color:rgba(255,255,255,0.3);text-align:right;}
.empty-state{text-align:center;padding:30px;color:rgba(255,255,255,0.3);font-size:14px;}
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  display:none;align-items:center;justify-content:center;
  z-index:2000;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:#16213e;border:1px solid rgba(255,255,255,0.1);
  border-radius:28px;padding:28px 24px;width:100%;max-width:400px;
  max-height:80vh;overflow-y:auto;
  animation:mPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes mPop{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
.modal-title{font-size:20px;font-weight:800;margin-bottom:20px;text-align:center;}
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:white;color:#1a2a1e;padding:12px 22px;
  border-radius:50px;font-weight:700;font-size:13px;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);z-index:9999;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-left:4px solid #2ECC71;}
.toast.error{border-left:4px solid #e74c3c;}
.sb-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.sb-stat-card{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border-radius:16px;padding:14px;text-align:center;
}
.sb-stat-card .n{font-size:26px;font-weight:900;}
.sb-stat-card .l{font-size:11px;opacity:0.85;}
.close-modal-btn{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:rgba(255,255,255,0.1);color:white;font-size:15px;
  font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;
  margin-top:12px;
}
.dl-btn{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#E67E22,#D35400);color:white;
  font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;
  margin-top:8px;
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="dash-header">
  <div class="header-row">
    <div style="display:flex;align-items:center;">
      <div class="logo-sm">SK</div>
      <div class="greet">
        <div class="greet-sub">Welcome back 👋</div>
        <div class="greet-name" id="headerName">Loading...</div>
      </div>
    </div>
    <div class="icon-btn" onclick="doLogout()" title="Logout">🚪</div>
  </div>
</div>

<!-- SCORE BANNER -->
<div class="score-banner" style="margin-top:16px;">
  <div>
    <div class="score-label">Total Score</div>
    <div class="score-num" id="bannerScore">0</div>
    <div style="font-size:12px;opacity:0.85;margin-top:4px;" id="bannerGames">0 games played</div>
  </div>
  <div class="rank-pill">
    <div class="rank-num" id="bannerRank">#1</div>
    <div class="rank-label">Your Rank</div>
  </div>
</div>

<!-- QUICK STATS -->
<div class="stats-row">
  <div class="stat-mini">
    <div class="stat-mini-num" id="statCorrect">0</div>
    <div class="stat-mini-lbl">✅ Correct</div>
  </div>
  <div class="stat-mini">
    <div class="stat-mini-num" id="statWrong" style="color:#e74c3c;">0</div>
    <div class="stat-mini-lbl">❌ Wrong</div>
  </div>
  <div class="stat-mini">
    <div class="stat-mini-num" id="statSkipped" style="color:#E67E22;">0</div>
    <div class="stat-mini-lbl">⏭️ Skipped</div>
  </div>
</div>

<!-- ACTION BUTTONS -->
<div class="actions">
  <button class="action-btn btn-play" onclick="window.location.href='index.html'">
    <span class="a-icon">🎮</span>Play Quiz
  </button>
  <button class="action-btn btn-score" onclick="showScoreboard()">
    <span class="a-icon">📊</span>Scoreboard
  </button>
  <button class="action-btn btn-pdf" onclick="downloadMyPDF()">
    <span class="a-icon">📄</span>Download PDF
  </button>
  <button class="action-btn btn-logout" onclick="doLogout()">
    <span class="a-icon">🚪</span>Logout
  </button>
</div>

<!-- RECENT GAMES -->
<div class="section">
  <div class="sec-title">Recent Games</div>
  <div class="history-list" id="historyList">
    <div class="empty-state">No games yet! Play some quizzes 🎮</div>
  </div>
</div>

<!-- SCOREBOARD MODAL -->
<div class="modal-overlay" id="sbModal">
  <div class="modal-box">
    <div class="modal-title">🏆 Leaderboard</div>
    <div id="sbContent"></div>
    <button class="dl-btn" onclick="downloadScorePDF()">📊 Download Score PDF</button>
    <button class="close-modal-btn" onclick="closeModal('sbModal')">Close</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyADzxE7HmL1Z9A7VM_VWo9I5Z2Y6_aZERk",
  authDomain:"my-game-17edb.firebaseapp.com",
  databaseURL:"https://my-game-17edb-default-rtdb.firebaseio.com",
  projectId:"my-game-17edb",
  storageBucket:"my-game-17edb.firebasestorage.app",
  appId:"1:980626912031:android:ae22c6a423ab33e76ef62a"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

let currentUser=null;
let currentUserData=null;
let allUsersRanking=[];

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

auth.onAuthStateChanged(user=>{
  if(!user){ window.location.href='login.html'; return; }
  currentUser=user;
  
  db.ref('users/'+user.uid).on('value', snap=>{
    if(snap.exists()){
      currentUserData=snap.val();
      document.getElementById('headerName').textContent=currentUserData.name||'Player';
      document.getElementById('bannerScore').textContent=currentUserData.score||0;
      document.getElementById('bannerGames').textContent=(currentUserData.gamesPlayed||0)+' games played';
      document.getElementById('statCorrect').textContent=currentUserData.totalCorrect||0;
      document.getElementById('statWrong').textContent=currentUserData.totalWrong||0;
      document.getElementById('statSkipped').textContent=currentUserData.totalSkipped||0;
      loadRanking();
    } else {
      const n = user.displayName || user.email?.split('@')[0] || 'Player';
      document.getElementById('headerName').textContent=n;
    }
  });
  loadGameHistory();
});

async function loadRanking(){
  const snap=await db.ref('users').orderByChild('score').get();
  if(snap.exists()){
    let users=[];
    snap.forEach(c=>users.push(c.val()));
    users.sort((a,b)=>(b.score||0)-(a.score||0));
    allUsersRanking=users;
    const rank=users.findIndex(u=>u.uid===currentUser.uid)+1;
    document.getElementById('bannerRank').textContent='#'+rank;
  }
}

function loadGameHistory(){
  const history=JSON.parse(localStorage.getItem('quizHistory_'+currentUser.uid))||[];
  const container=document.getElementById('historyList');
  if(!history.length){ container.innerHTML='<div class="empty-state">No games yet! Play some quizzes 🎮</div>'; return; }
  container.innerHTML=history.slice(0,10).map(g=>`
    <div class="history-item">
      <div class="history-top">
        <span class="history-cat">${g.category}</span>
        <span class="diff-badge ${g.difficulty}">${g.difficulty}</span>
      </div>
      <div class="history-stats">
        <div class="h-stat">✅ ${g.correct}<br><span style="font-size:9px;opacity:0.6;">Correct</span></div>
        <div class="h-stat">❌ ${g.wrong}<br><span style="font-size:9px;opacity:0.6;">Wrong</span></div>
        <div class="h-stat">⏭️ ${g.skipped}<br><span style="font-size:9px;opacity:0.6;">Skipped</span></div>
        <div class="h-stat" style="color:#2ECC71;">⭐ ${g.score}<br><span style="font-size:9px;opacity:0.6;">Score</span></div>
      </div>
      <div class="history-date">${g.date}</div>
    </div>
  `).join('');
}

async function showScoreboard(){
  document.getElementById('sbModal').classList.add('show');
  const snap=await db.ref('users').orderByChild('score').get();
  let users=[];
  if(snap.exists()) snap.forEach(c=>users.push(c.val()));
  users.sort((a,b)=>(b.score||0)-(a.score||0));
  const myRank=users.findIndex(u=>u.uid===currentUser.uid)+1;
  const myScore=currentUserData?.score||0;
  let html=`
    <div class="sb-stats">
      <div class="sb-stat-card"><div class="n">${users.length}</div><div class="l">Total Players</div></div>
      <div class="sb-stat-card"><div class="n">#${myRank}</div><div class="l">Your Rank</div></div>
    </div>
    <div style="margin-bottom:12px;font-size:13px;color:rgba(255,255,255,0.5);">🏆 Top Players</div>
  `;
  users.slice(0,10).forEach((u,i)=>{
    const isMe=u.uid===currentUser.uid;
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);
    html+=`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:14px;margin-bottom:8px;background:${isMe?'rgba(46,204,113,0.15)':'rgba(255,255,255,0.05)'};border:${isMe?'1px solid rgba(46,204,113,0.4)':'1px solid rgba(255,255,255,0.07)'};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:20px;">${medal}</span>
          <div>
            <div style="font-weight:700;font-size:14px;">${u.name}${isMe?' (You)':''}</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4);">${u.gamesPlayed||0} games</div>
          </div>
        </div>
        <div style="font-size:18px;font-weight:900;color:#2ECC71;">${u.score||0}</div>
      </div>
    `;
  });
  document.getElementById('sbContent').innerHTML=html;
}

function doLogout(){
  if(confirm('Are you sure you want to logout?')){
    auth.signOut().then(()=>window.location.href='login.html');
  }
}

async function downloadMyPDF(){
  if(!currentUserData){ showToast('Loading user data...','error'); return; }
  const history=JSON.parse(localStorage.getItem('quizHistory_'+currentUser.uid))||[];
  const snap=await db.ref('users').orderByChild('score').get();
  let users=[];
  if(snap.exists()) snap.forEach(c=>users.push(c.val()));
  users.sort((a,b)=>(b.score||0)-(a.score||0));
  const rank=users.findIndex(u=>u.uid===currentUser.uid)+1;
  generatePDF(currentUserData, history, rank, users.length);
}

function generatePDF(user, history, rank, totalUsers){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,H=297;
  
  doc.setFillColor(10,10,26); doc.rect(0,0,W,H,'F');
  doc.setFillColor(46,204,113); doc.rect(0,0,W,45,'F');
  doc.setFillColor(255,255,255);
  doc.roundedRect(15,8,28,28,6,6,'F');
  doc.setTextColor(46,204,113);
  doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text('SK',29,25,{align:'center'});
  doc.setTextColor(255,255,255);
  doc.setFontSize(24); doc.setFont('helvetica','bold');
  doc.text('SK Education World 🌎',W/2,20,{align:'center'});
  doc.setFontSize(12); doc.setFont('helvetica','normal');
  doc.text('Welcome to Our Website',W/2,32,{align:'center'});
  doc.setFillColor(26,42,30);
  doc.roundedRect(15,55,W-30,30,8,8,'F');
  doc.setFillColor(46,204,113);
  doc.roundedRect(15,55,4,30,2,2,'F');
  doc.setTextColor(46,204,113); doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text('🎓  '+user.name,25,73);
  doc.setTextColor(180,220,195); doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.text('SK Education World Member',25,80);
  doc.setFillColor(22,33,62);
  doc.roundedRect(15,94,W-30,82,10,10,'F');
  doc.setFillColor(46,204,113);
  doc.roundedRect(15,94,4,82,2,2,'F');
  doc.setTextColor(46,204,113); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('ACCOUNT INFORMATION',30,108);
  doc.setDrawColor(46,204,113); doc.setLineWidth(0.3); doc.line(30,111,W-20,111);
  const rows=[
    ['👤 Full Name',user.name],
    ['📱 Phone',user.phone],
    ['📧 Gmail',user.email],
    ['📅 Joined',new Date(user.createdAt).toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'})],
  ];
  rows.forEach((r,i)=>{
    const y=122+i*14;
    doc.setTextColor(120,180,140); doc.setFont('helvetica','bold'); doc.setFontSize(10);
    doc.text(r[0],30,y);
    doc.setTextColor(255,255,255); doc.setFont('helvetica','normal');
    doc.text(String(r[1]),100,y);
  });
  doc.setFillColor(46,204,113);
  doc.roundedRect(15,185,W/2-20,55,10,10,'F');
  doc.setFillColor(52,152,219);
  doc.roundedRect(W/2+5,185,W/2-20,55,10,10,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('🏆 Total Score',15+(W/2-20)/2,200,{align:'center'});
  doc.setFontSize(28); doc.text(String(user.score||0),15+(W/2-20)/2,218,{align:'center'});
  doc.setFontSize(11); doc.text('points',15+(W/2-20)/2,228,{align:'center'});
  doc.setFontSize(11); doc.text('🥇 Your Rank',W/2+5+(W/2-20)/2,200,{align:'center'});
  doc.setFontSize(28); doc.text('#'+rank,W/2+5+(W/2-20)/2,218,{align:'center'});
  doc.setFontSize(11); doc.text('of '+totalUsers+' players',W/2+5+(W/2-20)/2,228,{align:'center'});
  doc.setFillColor(26,42,30);
  doc.roundedRect(15,250,W-30,25,8,8,'F');
  doc.setTextColor(46,204,113); doc.setFont('helvetica','bold'); doc.setFontSize(14);
  doc.text('You are now #'+rank+' Rank — Focus on Study! 📚',W/2,265,{align:'center'});
  
  if(history.length>0){
    doc.addPage();
    doc.setFillColor(10,10,26); doc.rect(0,0,W,H,'F');
    doc.setFillColor(46,204,113); doc.rect(0,0,W,20,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(14);
    doc.text('Recent Game History',W/2,13,{align:'center'});
    let y=35;
    history.slice(0,10).forEach((g,i)=>{
      doc.setFillColor(22,33,62);
      doc.roundedRect(15,y,W-30,28,6,6,'F');
      doc.setTextColor(46,204,113); doc.setFont('helvetica','bold'); doc.setFontSize(11);
      doc.text(g.category,25,y+10);
      doc.setTextColor(180,220,195); doc.setFont('helvetica','normal'); doc.setFontSize(9);
      doc.text('✅ '+g.correct+'  ❌ '+g.wrong+'  ⏭️ '+g.skipped+'  ⭐ '+g.score,25,y+19);
      doc.setTextColor(100,140,120); doc.setFontSize(8);
      doc.text(g.date,W-20,y+10,{align:'right'});
      doc.setTextColor(200,200,200); doc.setFontSize(9);
      doc.text(g.difficulty.toUpperCase(),W-20,y+19,{align:'right'});
      y+=33;
    });
  }
  doc.setTextColor(80,120,90); doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text('SK Education World — Generated '+new Date().toLocaleString('en-IN'),W/2,H-8,{align:'center'});
  doc.save('SK_Report_'+user.name.replace(/ /g,'_')+'.pdf');
  showToast('📄 PDF Downloaded!','success');
}
