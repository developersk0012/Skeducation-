<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Education World - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#2ECC71;--green-dark:#1a8a4a;--blue:#3498DB;--purple:#9B59B6;
  --orange:#E67E22;--white:#fff;--light:#f0faf4;--dark:#1a2a1e;
}
body{
  font-family:'Nunito',sans-serif;
  background:var(--dark);
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  overflow-y:auto;
  overflow-x:hidden;
  position:relative;
  padding:20px 0;
}
.bg-anim{position:fixed;inset:0;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(60px);animation:floatOrb 8s ease-in-out infinite;}
.orb1{width:400px;height:400px;background:rgba(46,204,113,0.15);top:-100px;left:-100px;animation-delay:0s;}
.orb2{width:300px;height:300px;background:rgba(52,152,219,0.12);bottom:-50px;right:-50px;animation-delay:-3s;}
.orb3{width:250px;height:250px;background:rgba(155,89,182,0.1);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-5s;}
@keyframes floatOrb{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-20px) scale(1.05);}
  66%{transform:translate(-20px,30px) scale(0.95);}
}
.particles{position:absolute;inset:0;}
.particle{
  position:absolute;width:4px;height:4px;border-radius:50%;
  background:rgba(46,204,113,0.4);
  animation:particleFloat linear infinite;
}
@keyframes particleFloat{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{transform:translateY(-10vh) scale(1);opacity:0;}
}
.card-wrap{
  position:relative;z-index:10;
  width:100%;max-width:440px;
  margin:20px auto;
}
.card{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:32px;
  padding:36px 32px;
  box-shadow:0 30px 80px rgba(0,0,0,0.4);
  animation:cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(40px) scale(0.95);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.logo-area{text-align:center;margin-bottom:28px;}
.logo-icon{
  width:72px;height:72px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;color:white;
  font-family:'Poppins',sans-serif;
  box-shadow:0 8px 30px rgba(46,204,113,0.4);
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{
  0%,100%{box-shadow:0 8px 30px rgba(46,204,113,0.4);}
  50%{box-shadow:0 8px 50px rgba(46,204,113,0.7);}
}
.logo-title{font-size:22px;font-weight:900;color:white;font-family:'Poppins',sans-serif;}
.logo-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-top:4px;}
.tabs{
  display:flex;gap:4px;
  background:rgba(255,255,255,0.05);
  border-radius:16px;padding:4px;
  margin-bottom:24px;
}
.tab{
  flex:1;padding:12px;border:none;
  border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;background:transparent;color:rgba(255,255,255,0.5);
  transition:all 0.3s;font-family:'Nunito',sans-serif;
}
.tab.active{
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:white;
  box-shadow:0 4px 15px rgba(46,204,113,0.35);
}
.form-panel{animation:fadeSlide 0.35s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px;}
.input-wrap{position:relative;}
.input-wrap .icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:18px;pointer-events:none;
}
.input-wrap input{
  width:100%;padding:14px 14px 14px 44px;
  border:2px solid rgba(255,255,255,0.08);
  border-radius:16px;
  background:rgba(255,255,255,0.06);
  color:white;font-size:15px;font-family:'Nunito',sans-serif;font-weight:600;
  outline:none;transition:all 0.3s;
}
.input-wrap input:focus{
  border-color:var(--green);
  background:rgba(46,204,113,0.08);
  box-shadow:0 0 0 4px rgba(46,204,113,0.1);
}
.input-wrap input::placeholder{color:rgba(255,255,255,0.25);}
.btn{
  width:100%;padding:16px;border:none;
  border-radius:18px;
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:white;font-size:17px;font-weight:800;
  cursor:pointer;font-family:'Nunito',sans-serif;
  box-shadow:0 8px 25px rgba(46,204,113,0.35);
  transition:all 0.25s;margin-top:4px;
  position:relative;overflow:hidden;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(46,204,113,0.45);}
.btn:active{transform:translateY(0);}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.btn-spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:white;color:#1a2a1e;padding:14px 24px;
  border-radius:50px;font-weight:700;font-size:14px;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  z-index:9999;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;max-width:90vw;text-align:center;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-left:4px solid var(--green);}
.toast.error{border-left:4px solid #e74c3c;}
.divider{text-align:center;color:rgba(255,255,255,0.3);font-size:13px;margin:6px 0;}
</style>
</head>
<body>

<div class="bg-anim">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="particles" id="particles"></div>
</div>

<div class="toast" id="toast"></div>

<div class="card-wrap">
  <div class="card">
    <div class="logo-area">
      <div class="logo-icon">SK</div>
      <div class="logo-title">SK Education World 🌎</div>
      <div class="logo-sub">Your Learning Journey Starts Here</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">🔑 Login</button>
      <button class="tab" onclick="switchTab('signup')">✨ Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="form-panel">
      <div class="field">
        <label>Phone or Gmail</label>
        <div class="input-wrap">
          <span class="icon">📧</span>
          <input type="text" id="loginId" placeholder="Enter phone or email">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="loginPass" placeholder="Enter password">
        </div>
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Login →</button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" class="form-panel" style="display:none;">
      <div class="field">
        <label>Full Name</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" id="signupName" placeholder="Your full name">
        </div>
      </div>
      <div class="field">
        <label>Phone Number</label>
        <div class="input-wrap">
          <span class="icon">📱</span>
          <input type="tel" id="signupPhone" placeholder="+91 XXXXXXXXXX">
        </div>
      </div>
      <div class="field">
        <label>Gmail</label>
        <div class="input-wrap">
          <span class="icon">📧</span>
          <input type="email" id="signupEmail" placeholder="your@gmail.com">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="signupPass" placeholder="Create password">
        </div>
      </div>
      <button class="btn" id="signupBtn" onclick="doSignup()">Create Account ✨</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADzxE7HmL1Z9A7VM_VWo9I5Z2Y6_aZERk",
  authDomain: "my-game-17edb.firebaseapp.com",
  databaseURL: "https://my-game-17edb-default-rtdb.firebaseio.com",
  projectId: "my-game-17edb",
  storageBucket: "my-game-17edb.firebasestorage.app",
  appId: "1:980626912031:android:ae22c6a423ab33e76ef62a"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// Generate particles
const pc = document.getElementById('particles');
for(let i=0;i<25;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.cssText=`left:${Math.random()*100}%;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*10}s;width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;`;
  pc.appendChild(p);
}

auth.onAuthStateChanged(user => {
  if(user){ window.location.href='dashboard.html'; }
});

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('loginForm').style.display = t==='login'?'block':'none';
  document.getElementById('signupForm').style.display = t==='signup'?'block':'none';
}

function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3200);
}

function setLoading(btnId, loading){
  const b=document.getElementById(btnId);
  if(loading){ b.disabled=true; b.innerHTML=`<span class="btn-spinner"></span> Please wait...`; }
  else{ b.disabled=false; b.innerHTML=btnId==='loginBtn'?'Login →':'Create Account ✨'; }
}

async function doSignup(){
  const name=document.getElementById('signupName').value.trim();
  const phone=document.getElementById('signupPhone').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const pass=document.getElementById('signupPass').value.trim();
  
  if(!name||!phone||!email||!pass){ showToast('⚠️ Please fill all fields','error'); return; }
  if(pass.length<6){ showToast('⚠️ Password must be 6+ characters','error'); return; }
  
  setLoading('signupBtn',true);
  
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    const uid=cred.user.uid;
    
    const userData = {
      name: name,
      phone: phone,
      email: email,
      uid: uid,
      createdAt: Date.now(),
      score: 0,
      gamesPlayed: 0,
      totalCorrect: 0,
      totalWrong: 0,
      totalSkipped: 0
    };
    
    await db.ref('users/'+uid).set(userData);
    
    const phoneKey = phone.replace(/\+/g,'').replace(/\s/g,'').replace(/-/g,'');
    await db.ref('phoneMap/'+phoneKey).set({uid: uid, email: email});
    
    showToast('🎉 Account created! Welcome '+name+'!','success');
    
    // PDF download with slight delay to ensure data is saved
    setTimeout(() => {
      try {
        generateWelcomePDF(userData);
      } catch(e) {
        console.log('PDF error:', e);
      }
    }, 1000);
    
    setTimeout(()=>{ window.location.href='dashboard.html'; }, 3000);
    
  } catch(e){
    showToast('❌ '+e.message,'error');
    setLoading('signupBtn',false);
  }
}

async function doLogin(){
  const id=document.getElementById('loginId').value.trim();
  const pass=document.getElementById('loginPass').value.trim();
  if(!id||!pass){ showToast('⚠️ Please enter credentials','error'); return; }
  
  setLoading('loginBtn',true);
  
  try{
    let email=id;
    if(!id.includes('@')){
      const phoneKey=id.replace(/\+/g,'').replace(/\s/g,'').replace(/-/g,'');
      const snap=await db.ref('phoneMap/'+phoneKey).get();
      if(snap.exists()){ 
        email=snap.val().email; 
      } else { 
        showToast('❌ Phone not registered','error'); 
        setLoading('loginBtn',false); 
        return; 
      }
    }
    
    await auth.signInWithEmailAndPassword(email,pass);
    showToast('✅ Welcome back!','success');
    setTimeout(()=>{ window.location.href='dashboard.html'; },1000);
    
  } catch(e){
    showToast('❌ Invalid credentials','error');
    setLoading('loginBtn',false);
  }
}

function generateWelcomePDF(user){
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210, H=297;

    doc.setFillColor(10,10,26); doc.rect(0,0,W,H,'F');
    doc.setFillColor(46,204,113,0.05);
    doc.circle(W-40,40,60,'F');
    doc.circle(40,H-40,50,'F');

    doc.setFillColor(46,204,113); doc.roundedRect(0,0,W,55,0,0,'F');
    doc.setFillColor(26,140,74); doc.roundedRect(0,45,W,12,0,0,'F');

    doc.setFillColor(255,255,255);
    doc.roundedRect(15,10,32,32,8,8,'F');
    doc.setTextColor(46,204,113);
    doc.setFont('helvetica','bold'); doc.setFontSize(18);
    doc.text('SK',31,30,{align:'center'});

    doc.setTextColor(255,255,255);
    doc.setFontSize(26); doc.setFont('helvetica','bold');
    doc.text('SK Education World',W/2+8,24,{align:'center'});
    doc.setFontSize(12); doc.setFont('helvetica','normal');
    doc.text('Math Quiz Platform',W/2+8,36,{align:'center'});
    doc.setFontSize(10);
    doc.text('Welcome Certificate',W/2+8,50,{align:'center'});

    doc.setFillColor(26,33,62);
    doc.circle(W-40,120,38,'F');
    doc.setDrawColor(46,204,113); doc.setLineWidth(2);
    doc.circle(W-40,120,38,'S');

    doc.setFillColor(22,33,62);
    doc.roundedRect(12,68,120,28,8,8,'F');
    doc.setFillColor(46,204,113); doc.roundedRect(12,68,4,28,3,3,'F');
    doc.setTextColor(46,204,113); doc.setFont('helvetica','bold'); doc.setFontSize(14);
    doc.text('Welcome!',22,80);
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.text(user.name,22,91);

    doc.setFillColor(22,33,62);
    doc.roundedRect(12,108,120,80,10,10,'F');
    doc.setFillColor(46,204,113); doc.roundedRect(12,108,4,80,3,3,'F');

    doc.setTextColor(100,160,120); doc.setFont('helvetica','bold'); doc.setFontSize(9);
    doc.text('ACCOUNT DETAILS',22,120);
    doc.setDrawColor(46,204,113); doc.setLineWidth(0.3);
    doc.line(22,122,128,122);

    const rows=[
      ['Full Name', user.name],
      ['Phone', user.phone],
      ['Gmail', user.email],
      ['Joined', new Date(user.createdAt).toLocaleDateString('en-IN',{year:'numeric',month:'short',day:'numeric'})],
    ];
    rows.forEach((r,i)=>{
      const y = 132+i*16;
      doc.setTextColor(120,180,140); doc.setFont('helvetica','bold'); doc.setFontSize(9);
      doc.text(r[0], 22, y);
      doc.setTextColor(255,255,255); doc.setFont('helvetica','normal'); doc.setFontSize(10);
      const val = r[1].length>25 ? r[1].substring(0,22)+'...' : r[1];
      doc.text(val, 22, y+8);
    });

    doc.setFillColor(46,204,113);
    doc.roundedRect(12,200,W-24,35,10,10,'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold'); doc.setFontSize(15);
    doc.text('Your Learning Journey Starts Here!',W/2,215,{align:'center'});
    doc.setFontSize(10); doc.setFont('helvetica','normal');
    doc.text('Play quizzes, earn points, climb the leaderboard!',W/2,226,{align:'center'});

    const boxes=[
      {label:'Score',val:'0',color:[46,204,113]},
      {label:'Rank',val:'#-',color:[52,152,219]},
      {label:'Games',val:'0',color:[155,89,182]},
    ];
    const bW=55, bX=12;
    boxes.forEach((b,i)=>{
      const x=bX+i*(bW+5);
      doc.setFillColor(22,33,62);
      doc.roundedRect(x,245,bW,32,8,8,'F');
      doc.setFillColor(...b.color);
      doc.roundedRect(x,245,bW,8,8,8,'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(18);
      doc.text(b.val,x+bW/2,268,{align:'center'});
      doc.setFontSize(8); doc.setFont('helvetica','normal');
      doc.text(b.label,x+bW/2,274,{align:'center'});
    });

    doc.setTextColor(60,90,70); doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.text('SK Education World — Generated '+new Date().toLocaleString('en-IN'),W/2,290,{align:'center'});

    doc.save('SK_Welcome_'+user.name.replace(/ /g,'_')+'.pdf');
    console.log('PDF downloaded!');
  }catch(e){ console.log('PDF error',e); }
}
</script>
</body>
</html>
